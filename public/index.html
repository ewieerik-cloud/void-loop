// Preload all SFX silently — missing files are simply skipped
(function preloadSFX(){
  for(const [key, file] of Object.entries(SFX_FILES)){
    const a = new Audio();
    a.preload = 'auto';
    a.volume = SFX_VOL_MASTER;
    a.src = SFX_PATH + file;
    a.addEventListener('canplaythrough', ()=>{ SFX_CACHE[key] = a; }, {once:true});
    a.load();
  }
})();

// Play a one-shot SFX: tries MP3, falls back to SYNTH
function snd(name){
  if(!CFG.SFX_ENABLED || !_sfxOn) return;
  try{ getACtx(); }catch(e){}
  if(SFX_CACHE[name]){
    const a = SFX_CACHE[name].cloneNode();
    a.volume = _sfxVolume;
    a.play().catch(()=>{});
  } else {
    SYNTH[name]?.();
  }
}

// ── Orb sequence tracker ──────────────────────────────────────
let _orbSoundIndex = 0; // increments each collect within a group, resets on new group

function sndOrb(){
  if(!CFG.SFX_ENABLED || !_sfxOn) return;
  _orbSoundIndex++;
  const idx = Math.min(_orbSoundIndex, 10);
  const key = 'orb' + idx;
  if(SFX_CACHE[key]){
    const a = SFX_CACHE[key].cloneNode();
    a.volume = _sfxVolume;
    a.play().catch(()=>{});
  } else {
    SYNTH['collect']?.();
  }
}

function resetOrbSounds(){ _orbSoundIndex = 0; }

// ── MUSIC SYSTEM — playlist style, no random shuffling ───────
const MUSIC_FILES = {
  lobby:    ['LobbyMusic1.mp3','LobbyMusic2.mp3','LobbyMusic3.mp3','LobbyMusic4.mp3','LobbyMusic5.mp3'],
  normal:   ['MusicNormal1.mp3','MusicNormal2.mp3','MusicNormal3.mp3','MusicNormal4.mp3','MusicNormal5.mp3'],
  matrix:   ['MatrixBossMusic.mp3'],
  slash:    ['SlasherBossMusic.mp3'],
  darkness: ['DarknessBossMusic.mp3'],
  recursion:['RecursionBossMusic.mp3'],
  man:      ['ManBossMusic.mp3'],
};
const PLAYLIST_CATS = new Set(['lobby','normal']); // these play sequentially, no loop
const MUSIC_CACHE   = {};  // "cat:idx" → HTMLAudioElement
const _available    = {};  // cat → sorted list of idx that canplaythrough fired

let _curCat  = null;
let _curIdx  = 0;
let _fadeTmr = null;
let _musicVolume = 0.5;
let _sfxVolume   = 1.0;
let _musicOn = true;
let _sfxOn   = true;
const MUSIC_FADE_MS = 1000;

(function _buildCache(){
  for(const [cat, files] of Object.entries(MUSIC_FILES)){
    // Pre-populate all indices immediately — missing files just fail silently on play()
    _available[cat] = files.map((_,i)=>i);
    files.forEach((file, idx)=>{
      const a = new Audio();
      a.preload='auto'; a.volume=0;
      a.loop = !PLAYLIST_CATS.has(cat);
      a.src  = SFX_PATH + file;
      a.addEventListener('ended', ()=>{
        if(_curCat===cat && _curIdx===idx) _playNextInPlaylist(cat);
      });
      a.load();
      MUSIC_CACHE[cat+':'+idx] = a;
    });
  }
})();

// Browsers block autoplay until first user gesture — retry on any interaction
function _ensureMusicPlaying(){
  const a=_curAudio();
  if(a && a.paused && _musicOn) a.play().catch(()=>{});
}
window.addEventListener('pointerdown', _ensureMusicPlaying, {once:true});
window.addEventListener('keydown',     _ensureMusicPlaying, {once:true});

function _curAudio(){ return _curCat ? MUSIC_CACHE[_curCat+':'+_curIdx]||null : null; }

function _playNextInPlaylist(cat){
  const avail = _available[cat];
  if(!avail||avail.length===0) return;
  const pos     = avail.indexOf(_curIdx);
  const nextIdx = avail[(pos+1) % avail.length];
  _curIdx = nextIdx;
  const a = MUSIC_CACHE[cat+':'+nextIdx];
  if(!a) return;
  a.currentTime = 0;
  a.volume = _musicVolume;
  a.play().catch(()=>{});
}

function playMusic(cat){
  // landing and lobby both use 'lobby' — don't restart if already playing
  if(cat === _curCat) return;
  if(!_musicOn){ _curCat=cat; _curIdx=(_available[cat]||[])[0]||0; return; }

  const avail  = _available[cat];
  const start  = avail && avail.length ? avail[0] : 0;
  const prev   = _curAudio();
  _curCat = cat; _curIdx = start;
  const next = MUSIC_CACHE[cat+':'+start];

  if(_fadeTmr){ clearInterval(_fadeTmr); _fadeTmr=null; }
  if(next){ next.currentTime=0; next.volume=0; next.play().catch(()=>{}); }

  const steps=30, ms=MUSIC_FADE_MS/steps; let s=0;
  _fadeTmr = setInterval(()=>{
    s++;
    const t=s/steps;
    if(prev) prev.volume = Math.max(0, _musicVolume*(1-t));
    if(next) next.volume = Math.min(_musicVolume, _musicVolume*t);
    if(s>=steps){
      clearInterval(_fadeTmr); _fadeTmr=null;
      if(prev){ prev.pause(); prev.currentTime=0; prev.volume=0; }
      if(next) next.volume=_musicVolume;
    }
  }, ms);
}

function stopMusic(){
  if(_fadeTmr){ clearInterval(_fadeTmr); _fadeTmr=null; }
  for(const a of Object.values(MUSIC_CACHE)){ a.pause(); a.currentTime=0; a.volume=0; }
  _curCat=null; _curIdx=0;
}
function pauseMusic(){  const a=_curAudio(); if(a) a.pause(); }
function resumeMusic(){ if(!_musicOn) return; const a=_curAudio(); if(a) a.play().catch(()=>{}); }
function setMusicVolume(v){
  _musicVolume=Math.max(0,Math.min(1,v));
  const a=_curAudio(); if(a) a.volume=_musicOn?_musicVolume:0;
}
function setSfxVolume(v){ _sfxVolume=Math.max(0,Math.min(1,v)); }
function toggleMusic(){ _musicOn=!_musicOn; _musicOn?resumeMusic():pauseMusic(); }
function toggleSfx()  { _sfxOn  =!_sfxOn; }

function resize(){

}

const shk={x:0,y:0,pow:0,t:0};

function stepShake(dt){
  if(shk.t>0){shk.t-=dt;const s=shk.pow*Math.max(0,shk.t);shk.x=(Math.random()*2-1)*s;shk.y=(Math.random()*2-1)*s;}
  else{shk.x=shk.y=0;}
}

function stepParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.life-=dt;
    if(p.life<=0){parts.splice(i,1);continue;}
    if(p.t==='r'){p.r+=p.vr*dt;continue;}
    const df=Math.exp(-(p.dm||3.5)*dt);
    p.vx*=df;p.vy*=df;p.vy+=p.gy*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;
  }
}
function stepMatrixFX(dt){
  for(let i=matrixParts.length-1;i>=0;i--){
    const p=matrixParts[i];p.life-=dt;
    if(p.life<=0){matrixParts.splice(i,1);continue;}
    if(p.t==='flash')continue;
    if(p.t==='streak'){p.ox=p.x;p.oy=p.y;}
    if(p.t==='ch'){p.ct=(p.ct||0)+dt;if(p.ct>0.07){p.ch=p.POOL[Math.floor(rnd(0,p.POOL.length))];p.ct=0;}}
    const df=Math.exp(-(p.dm||3)*dt);
    p.vx*=df;p.vy*=df;p.vy+=(p.gy||0)*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;
  }
}

function drawParts(){
  for(const p of parts){
    const a=Math.max(0,Math.min(1,p.life/p.ml));if(a<0.01)continue;
    X.save();X.globalAlpha=a;
    if(p.t==='r'){
      X.strokeStyle=p.col;X.shadowColor=p.col;X.shadowBlur=12*a;X.lineWidth=p.lw;
      X.beginPath();X.arc(p.x,p.y,Math.max(0.1,p.r),0,PI2);X.stroke();
    }else{
      const sz=Math.max(0.3,p.sz*a);
      X.shadowColor=p.col;X.shadowBlur=8*a;X.fillStyle=p.col;
      X.beginPath();X.arc(p.x,p.y,sz,0,PI2);X.fill();
    }
    X.restore();
  }
}
function drawMatrixFX(){
  for(const p of matrixParts){
    const a=Math.max(0,Math.min(1,p.life/p.ml));if(a<0.01)continue;
    X.save();X.globalAlpha=a;X.shadowColor=p.col;
    if(p.t==='sq'){const sz=Math.max(0.3,p.sz*a);X.translate(p.x,p.y);X.rotate(p.rot||0);X.fillStyle=p.col;X.shadowBlur=8;X.fillRect(-sz/2,-sz/2,sz,sz);}
    else if(p.t==='ch'){X.fillStyle=p.col;X.shadowBlur=14;X.font='bold 13px monospace';X.textAlign='center';X.textBaseline='middle';X.fillText(p.ch||'0',p.x,p.y);}
    else if(p.t==='streak'){X.strokeStyle=p.col;X.shadowBlur=22;X.lineWidth=(p.w||2)*(1+a);X.beginPath();X.moveTo(p.ox||p.x,p.oy||p.y);X.lineTo(p.x,p.y);X.stroke();}
    else if(p.t==='flash'){const frac=p.life/p.ml,g=X.createRadialGradient(p.x,p.y,0,p.x,p.y,p.sz*frac+4);g.addColorStop(0,p.col);g.addColorStop(1,'transparent');X.globalAlpha=frac;X.fillStyle=g;X.shadowBlur=0;X.beginPath();X.arc(p.x,p.y,p.sz+6,0,PI2);X.fill();}
    X.restore();
  }
}

const POISON={

  CHAR_FONT:34, CHAR_SPACING:40, CHAR_RADIUS:18,
  SPEED_MIN:80, SPEED_MAX:200,
  PILL_RADIUS:16,
  RED_PHASES:10, RED_SPEED:1.2,
  MATRIX_COL:'#00ff44', MATRIX_BG:'#040412',
  SYMBOLS:'0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!@#$%^&*()_+-=[]{}|;:,.<>?/',
};
let matrixState=null; // null | 'digits' | 'pills'
let matrixLines=[],poisonPills=[];
let matrixGlitch=0,matrixGlitchTimer=0;
let redPillActive=false,redPillPhasesLeft=0,redPillSpeedMult=1;
let matrixPortal=null,_portalAngle=0,portalTransition=null;
let _bossPortal=null; // {type,x,y,countdown,angle} — non-matrix boss portals
let _paused=false; // pause state
let _wallWarp=[]; // {side,t} wall warp flash entries
let diedInMatrix=false;
let orbStreak=0; // 0–5: streak tier for bonus orb sizing and points

function _buildMatrixLines(){
  matrixLines=[];
  for(let i=0;i<POISON.LINE_COUNT;i++){
    const n=Math.floor(rnd(POISON.CHARS_MIN,POISON.CHARS_MAX+1));
    const h=n*POISON.CHAR_SPACING;
    matrixLines.push({
      x:AX+rnd(POISON.CHAR_FONT*0.5,AS-POISON.CHAR_FONT*0.5),
      y:AY-h-rnd(10,60)-i*rnd(20,60),
      spd:rnd(POISON.SPEED_MIN,POISON.SPEED_MAX),
      chars:Array.from({length:n},()=>({ch:POISON.SYMBOLS[Math.floor(rnd(0,POISON.SYMBOLS.length))],t:0,iv:rnd(0.05,0.18)})),
    });
  }
}
function triggerMatrixEvent(){
  matrixState='digits'; matrixGlitch=0; matrixGlitchTimer=0; _matrixDigitsTimer=0;
  matrixLines=[]; poisonPills=[]; _buildMatrixLines();
  enemies=[]; const _mcnt=Math.max(1,Math.min(phase,4)); for(let i=0;i<_mcnt;i++) spawnEnemyTop();
  spawnGroup();
  addCallout('SIMULATION CORRUPTED',true,'#00ff44',true);
}
function triggerPillSpawn(){
  matrixState='pills'; pillTimer=0;
  snd('matrix_decipher');
  const cx=AX+AS/2,cy=AY+AS/2;
  poisonPills=[{x:cx-AS*0.22,y:cy,type:'red',pulse:0},{x:cx+AS*0.22,y:cy,type:'blue',pulse:0}];
  addCallout('PICK YOUR POISON',true,'#00ff44',true);
}
function collectMatrixPill(type){
  const px=poisonPills.find(p=>p.type===type)||{x:player.x,y:player.y};
  matrixState=null; matrixLines=[]; poisonPills=[]; matrixGlitch=0; matrixGlitchTimer=0; pillTimer=0;
  _bossPhaseTimer=0; // boss phase over — don't let endBossPhase fire later
  _matrixDigitsTimer=0;
  if(type==='blue'){FX_BLUE_PILL(px.x,px.y);addCallout('CLARITY RESTORED',true,'#44aaff',true);FX_PHASE();snd('pill_blue');snd('phase');playMusic('normal');}
  else{FX_RED_PILL(px.x,px.y);redPillActive=true;redPillPhasesLeft=POISON.RED_PHASES;redPillSpeedMult=POISON.RED_SPEED;_redPillSafeFrames=8;addCallout('REALITY FRACTURED',true,'#ff2244',true);FX_PHASE();snd('pill_red');snd('phase');playMusic('normal');}
  // Spawn enemies from top and a fresh orb group so phase can advance normally
  const cnt=Math.max(1,Math.min(phase,3));
  for(let i=0;i<cnt;i++)spawnEnemyTop();
  if(type==='red')spawnEnemyTop(); // extra enemy for red pill chaos
  spawnGroup();
}
function updateMatrixPhase(dt){
  matrixGlitchTimer+=dt; matrixGlitch=Math.min(1,matrixGlitchTimer/1.5);
  for(const ln of matrixLines){
    ln.y+=ln.spd*dt;
    const h=ln.chars.length*POISON.CHAR_SPACING;
    if(ln.y>AY+AS+h){ln.y=AY-h-rnd(5,40);ln.x=AX+rnd(POISON.CHAR_FONT*0.5,AS-POISON.CHAR_FONT*0.5);ln.spd=rnd(POISON.SPEED_MIN,POISON.SPEED_MAX);}
    for(const c of ln.chars){c.t+=dt;if(c.t>=c.iv){c.t=0;c.ch=POISON.SYMBOLS[Math.floor(rnd(0,POISON.SYMBOLS.length))];c.iv=rnd(0.08,0.28);}}
  }
  if(player&&matrixState==='digits'){
    _matrixDigitsTimer+=dt;
    // Auto-trigger pill spawn after 10 seconds in digits mode
    if(_matrixDigitsTimer>=10){triggerPillSpawn();return;}
    for(const ln of matrixLines){
      for(let j=0;j<ln.chars.length;j++){
        const cy=ln.y+j*POISON.CHAR_SPACING;
        if(cy<AY||cy>AY+AS)continue;
        const dx=player.x-ln.x,dy=player.y-cy;
        if(!isInvincible()&&Math.sqrt(dx*dx+dy*dy)<CFG.P_RADIUS+POISON.CHAR_RADIUS){killPlayer();return;}
      }
    }
  }
  if(matrixState==='pills'&&player){
    pillTimer+=dt;
    if(pillTimer>=25){addCallout('TIME EXPIRED — BLUE PILL',true,'#44aaff',true);collectMatrixPill('blue');return;}
    for(const pill of poisonPills){
      pill.pulse=(pill.pulse||0)+dt;
      const dx=player.x-pill.x,dy=player.y-pill.y;
      if(Math.sqrt(dx*dx+dy*dy)<CFG.P_RADIUS+POISON.PILL_RADIUS){collectMatrixPill(pill.type);return;}
    }
  }
}

  enemies=[]; for(const c of colls)pspark(c.x,c.y,POISON.MATRIX_COL,6,60,180,0.2,0.6,1,4);
  colls=[];grp=null; pspark(player.x,player.y,POISON.MATRIX_COL,30,100,400,0.4,1.0,2,7);
}

/* ══════════════════════════════════════════════════════════════
   §7  SLASH PHASE

let slashPhase=null;

function initSlashPhase(mini=false){
  const padding=AS*0.15;
  const bossX=player.x<AX+AS/2?AX+AS-padding:AX+padding;
  const bossY=player.y<AY+AS/2?AY+AS-padding:AY+padding;
  const dotCount=mini?3:5;
  const boss={x:bossX,y:bossY,vx:rnd(-30,30),vy:rnd(-30,30),hp:1,dead:false,bullets:[],laserTimer:mini?2.5:1.5,angle:rnd(0,PI2),rotSpeed:rnd(0.4,0.8)};
  const dots=[];
  const avoidAll=[{x:boss.x,y:boss.y,r:120},{x:player.x,y:player.y,r:100}];
  for(let i=0;i<dotCount;i++){
    const p=safePos(22,avoidAll);dots.push({x:p.x,y:p.y,activated:false,idx:i+1});
    avoidAll.push({x:p.x,y:p.y,r:80});
  }
  if(!mini){grp=null;colls=[];enemies=[];}// real boss clears arena; mini boss does not
  slashPhase={active:true,dots,nextExpected:1,boss,cin:null,gameTimeScale:1.0,distortion:0,done:false,slashLines:[],bloodParts:[],mini};
  addCallout(mini?'MINI SLASHER':'SLASH THE BOSS',true,mini?'#ff8844':'#ff2244');triggerShake(18,0.25);
}

function updateSlashPhase(dt,rawDt){
  if(!slashPhase||slashPhase.done)return;
  const sp=slashPhase;
  // Use raw dt for boss/bullet movement (gameTimeScale applied internally)
  const sDt=(rawDt||dt)*sp.gameTimeScale;
  if(!sp.cin&&!sp.boss.dead){
    const b=sp.boss;
    b.angle+=sDt*b.rotSpeed;b.x+=b.vx*sDt;b.y+=b.vy*sDt;
    const bR=30;
    if(b.x-bR<AX){b.x=AX+bR;b.vx=Math.abs(b.vx);}if(b.x+bR>AX+AS){b.x=AX+AS-bR;b.vx=-Math.abs(b.vx);}
    if(b.y-bR<AY){b.y=AY+bR;b.vy=Math.abs(b.vy);}if(b.y+bR>AY+AS){b.y=AY+AS-bR;b.vy=-Math.abs(b.vy);}
    b.laserTimer-=sDt;
    if(b.laserTimer<=0){b.laserTimer=1.0;const bdx=player.x-b.x,bdy=player.y-b.y,bdl=Math.sqrt(bdx*bdx+bdy*bdy)||1;b.bullets.push({x:b.x,y:b.y,vx:(bdx/bdl)*320,vy:(bdy/bdl)*320,life:3.5});}
    for(let bi=b.bullets.length-1;bi>=0;bi--){
      const bl=b.bullets[bi];bl.x+=bl.vx*sDt;bl.y+=bl.vy*sDt;bl.life-=sDt;
      if(bl.life<=0||bl.x<AX-20||bl.x>AX+AS+20||bl.y<AY-20||bl.y>AY+AS+20){b.bullets.splice(bi,1);continue;}
      // Bullets respect invincibility
      if(!isInvincible()&&dst(bl.x,bl.y,player.x,player.y)<CFG.P_RADIUS+7){killPlayer();return;}
    }
    for(const dot of sp.dots){
      if(dot.activated||dot.idx!==sp.nextExpected)continue;
      if(dst(player.x,player.y,dot.x,dot.y)<CFG.P_RADIUS+20){
        dot.activated=true;sp.nextExpected++;triggerShake(10,0.08);snd('dot_activate');
        if(sp.nextExpected>sp.dots.length){startSlashCinematic();break;}
      }
    }
    if(!sp.cin){
      for(const dot of sp.dots){
        if(dot.activated)continue;
        if(dot.idx!==sp.nextExpected&&dst(player.x,player.y,dot.x,dot.y)<CFG.P_RADIUS+20){
          for(const d of sp.dots)d.activated=false;sp.nextExpected=1;addCallout('WRONG ORDER',false,'#ff4400');triggerShake(20,0.15);
        }
      }
    }
  }
  // Always use raw dt for cinematic so time-scale doesn't double-slow it
  if(sp.cin)updateSlashCinematic(rawDt||dt);
  for(let i=sp.slashLines.length-1;i>=0;i--){sp.slashLines[i].life-=dt;if(sp.slashLines[i].life<=0)sp.slashLines.splice(i,1);}
  for(let i=sp.bloodParts.length-1;i>=0;i--){const p=sp.bloodParts[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=200*dt;if(p.life<=0)sp.bloodParts.splice(i,1);}
}

function startSlashCinematic(){
  const sp=slashPhase;sp.gameTimeScale=0.12;sp.distortion=0.8;triggerShake(12,0.2);
  const lastDot=sp.dots[sp.dots.length-1];
  sp.cin={state:'intro',t:0,dashIdx:sp.dots.length,dashFrom:{x:player.x,y:player.y},dashTo:{...lastDot}};
  // Grant invincibility during cinematic
  effect={type:'invincible',t:4,maxT:4,_slashInv:true};
  addCallout('SLASH COMBO',true,'#ff0044');
}

function updateSlashCinematic(dt){
  const sp=slashPhase,cin=sp.cin;cin.t+=dt;
  if(cin.state==='intro'){sp.gameTimeScale=Math.max(0.08,sp.gameTimeScale-dt*0.5);if(cin.t>=0.35){cin.state='dash';cin.t=0;cin.dashDur=0.09;cin.dashFrom={x:player.x,y:player.y};cin.dashTo={x:sp.dots[cin.dashIdx-1].x,y:sp.dots[cin.dashIdx-1].y};}return;}
  if(cin.state==='dash'){const prog=Math.min(1,cin.t/cin.dashDur);player.x=cin.dashFrom.x+(cin.dashTo.x-cin.dashFrom.x)*prog;player.y=cin.dashFrom.y+(cin.dashTo.y-cin.dashFrom.y)*prog;player.vx=0;player.vy=0;if(prog>=1){cin.state='slash';cin.t=0;spawnSlashLines(cin.dashFrom,cin.dashTo,'#ff2244');triggerShake(30,0.08);}return;}
  if(cin.state==='slash'){sp.dots[cin.dashIdx-1].gone=true;spawnBloodBurst(sp.dots[cin.dashIdx-1].x,sp.dots[cin.dashIdx-1].y,'#ff2244');cin.dashIdx--;if(cin.dashIdx>=1){cin.state='dash';cin.t=0;cin.dashDur=0.09;cin.dashFrom={x:player.x,y:player.y};cin.dashTo={x:sp.dots[cin.dashIdx-1].x,y:sp.dots[cin.dashIdx-1].y};}else{cin.state='dash_boss';cin.t=0;cin.dashDur=0.14;cin.dashFrom={x:player.x,y:player.y};cin.dashTo={x:sp.boss.x,y:sp.boss.y};}return;}
  if(cin.state==='dash_boss'){const prog=Math.min(1,cin.t/cin.dashDur);player.x=cin.dashFrom.x+(cin.dashTo.x-cin.dashFrom.x)*prog;player.y=cin.dashFrom.y+(cin.dashTo.y-cin.dashFrom.y)*prog;player.vx=0;player.vy=0;if(prog>=1){cin.state='slash_boss';cin.t=0;spawnSlashLines(cin.dashFrom,cin.dashTo,'#ffffff');triggerShake(22,0.2);}return;}
  if(cin.state==='slash_boss'){if(cin.t>0.08){cin.state='explode';cin.t=0;sp.boss.dead=true;sp.boss.bullets=[];spawnBossExplosion(sp.boss.x,sp.boss.y);spawnSlashLines({x:player.x-40,y:player.y-40},{x:sp.boss.x+40,y:sp.boss.y+40},'#ffffff');spawnSlashLines({x:player.x,y:player.y},{x:sp.boss.x,y:sp.boss.y},'#ff0022');}return;}
  if(cin.state==='explode'){if(cin.t>0.4){cin.state='recover';cin.t=0;}return;}
  if(cin.state==='recover'){sp.gameTimeScale=Math.min(1.0,sp.gameTimeScale+dt*0.45);sp.distortion=Math.max(0,sp.distortion-dt*0.5);if(sp.gameTimeScale>=0.98){
    sp.gameTimeScale=1.0;sp.distortion=0;sp.cin=null;sp.done=true;slashPhase=null;
    // 2s post-slash invincibility
    effect={type:'invincible',t:2,maxT:2,_slashInv:true};
    const _pcPts=sp.mini?100:200;points+=_pcPts;addFloatText('+'+_pcPts,player.x,player.y-40,'#00ff88');
    addCallout('PHASE CLEAR',true,'#00ff88');triggerShake(18,0.15);
    _bossPhaseTimer=0;
    if(sp.mini){ postMiniBossComplete(); } else { const _cnt=Math.max(1,Math.min(phase,3));for(let i=0;i<_cnt;i++)spawnEnemyTop();spawnGroup();playMusic('normal'); }}return;}
}
function spawnSlashLines(from,to,col){
  const sp=slashPhase;if(!sp)return;snd('slash_swing');
  const dx=to.x-from.x,dy=to.y-from.y,perp={x:-dy*0.08,y:dx*0.08};
  for(let i=0;i<4;i++){const off=rnd(-18,18);sp.slashLines.push({x1:from.x+perp.x*rnd(-1,1)+off,y1:from.y+perp.y*rnd(-1,1)+off,x2:to.x+perp.x*rnd(-1,1)+off,y2:to.y+perp.y*rnd(-1,1)+off,life:rnd(0.08,0.22),maxLife:0.22,col:col||'#ff2244',lw:rnd(1.5,4)});}
}
function spawnBloodBurst(x,y,col){
  const sp=slashPhase;if(!sp)return;
  for(let i=0;i<28;i++){const a=rnd(0,PI2),s=rnd(80,380);sp.bloodParts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-80,life:rnd(0.3,0.9),ml:0.9,col:col||'#ff1122',sz:rnd(3,9)});}
  pspark(x,y,col||'#ff1122',20,60,340,0.3,0.8,2,7);pring(x,y,col||'#ff0000',6,520,0.4,3);
}
function spawnBossExplosion(x,y){
  snd('slash_impact');
  if(slashPhase){
    const sp=slashPhase;
    for(let i=0;i<80;i++){const a=rnd(0,PI2),s=rnd(100,700);sp.bloodParts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-120,life:rnd(0.5,2.2),ml:2.2,col:i%3===0?'#ff6600':'#cc0011',sz:rnd(4,14)});}
  }
  pspark(x,y,'#ff2200',40,100,600,0.5,1.8,3,10);pspark(x,y,'#ffffff',20,60,400,0.3,1.0,2,6);
  pring(x,y,'#ff0000',10,800,0.7,5);pring(x,y,'#ffffff',6,500,1.1,3);triggerShake(14,0.25);

function drawSlashPhase(ts){
  if(!slashPhase)return;const sp=slashPhase;
  if(sp.distortion>0){
    const d=sp.distortion;X.save();X.globalAlpha=d*0.18;
    const grd=X.createLinearGradient(AX,AY,AX+AS,AY+AS);grd.addColorStop(0,'rgba(255,0,30,0.9)');grd.addColorStop(0.5,'rgba(0,0,0,0)');grd.addColorStop(1,'rgba(0,80,255,0.9)');
    X.fillStyle=grd;X.fillRect(AX,AY,AS,AS);X.globalAlpha=d*0.07*Math.abs(Math.sin(ts/40));X.fillStyle='#ff0033';
    for(let gy=AY;gy<AY+AS;gy+=4)X.fillRect(AX,gy,AS,1);X.globalAlpha=1;X.restore();
  }
  if(!sp.boss.dead){
    const b=sp.boss,bR=30,pulse=0.9+0.1*Math.sin(ts/120);
    X.save();X.shadowColor='#ff2200';X.shadowBlur=40*pulse;X.strokeStyle='#ff4400';X.lineWidth=3;
    X.beginPath();X.arc(b.x,b.y,bR+10,0,PI2);X.stroke();
    for(let i=0;i<6;i++){const a=b.angle+i*PI2/6,ix=b.x+Math.cos(a)*(bR+5),iy=b.y+Math.sin(a)*(bR+5),ox=b.x+Math.cos(a)*(bR+22),oy=b.y+Math.sin(a)*(bR+22);X.strokeStyle='#ff2200';X.lineWidth=2.5;X.beginPath();X.moveTo(ix,iy);X.lineTo(ox,oy);X.stroke();}
    X.shadowColor='#ff1100';X.shadowBlur=50*pulse;X.fillStyle='#880000';X.beginPath();X.arc(b.x,b.y,bR,0,PI2);X.fill();
    X.shadowBlur=15;X.fillStyle='#ff2200';X.beginPath();X.arc(b.x,b.y,bR,0,PI2);X.fill();
    X.shadowBlur=0;X.fillStyle='#ff8844';X.beginPath();X.arc(b.x,b.y,bR*0.4,0,PI2);X.fill();
    X.fillStyle='#ffffff';X.beginPath();X.arc(b.x,b.y,bR*0.14,0,PI2);X.fill();
    for(const bl of b.bullets){const bang=Math.atan2(bl.vy,bl.vx);X.save();X.translate(bl.x,bl.y);X.rotate(bang);X.shadowColor='#ffff00';X.shadowBlur=16;X.fillStyle='#ffee00';X.fillRect(-31.5,-3.5,63,7);X.fillStyle='#ffffff';X.fillRect(-31.5,-1.5,63,3);X.restore();}
    X.restore();
  }
  for(const dot of sp.dots){
    if(dot.gone)continue;const activated=dot.activated,isNext=dot.idx===sp.nextExpected&&!sp.cin;
    const col=activated?'#00ff88':isNext?'#ffff00':'#ff2244';const pulse=0.85+0.15*Math.sin(ts/160+dot.idx*0.9);
    X.save();X.shadowColor=col;X.shadowBlur=activated?22:14;X.strokeStyle=col;X.lineWidth=2;
    X.beginPath();X.arc(dot.x,dot.y,20*pulse,0,PI2);X.stroke();X.fillStyle=activated?'rgba(0,255,136,0.15)':'rgba(255,34,68,0.08)';X.beginPath();X.arc(dot.x,dot.y,20*pulse,0,PI2);X.fill();
    X.shadowBlur=8;X.fillStyle=col;X.beginPath();X.arc(dot.x,dot.y,5,0,PI2);X.fill();
    X.shadowBlur=0;X.fillStyle=col;X.font=`bold 14px ${FM}`;X.textAlign='center';X.textBaseline='bottom';X.fillText(dot.idx,dot.x,dot.y-24);X.restore();
  }
  for(const sl of sp.slashLines){const a=sl.life/sl.maxLife;X.save();X.globalAlpha=a;X.shadowColor=sl.col;X.shadowBlur=20*a;X.strokeStyle=sl.col;X.lineWidth=sl.lw*(1+a*2);X.beginPath();X.moveTo(sl.x1,sl.y1);X.lineTo(sl.x2,sl.y2);X.stroke();X.restore();}
  for(const p of sp.bloodParts){const a=p.life/p.ml;X.save();X.globalAlpha=Math.min(1,a*1.5);X.fillStyle=p.col;X.shadowColor=p.col;X.shadowBlur=6*a;X.beginPath();X.arc(p.x,p.y,p.sz*a,0,PI2);X.fill();X.restore();}
  if(!sp.cin&&!sp.boss.dead){X.save();X.textAlign='center';X.textBaseline='top';X.font=`10px ${FM}`;X.fillStyle='rgba(255,34,68,0.7)';X.fillText('SLASH THE BOSS — activate dots in order',AX+AS/2,AY+AS+30);X.restore();}
}

/* ══════════════════════════════════════════════════════════════
   §7b  SHOOTER PHASE — Big boss, 4 cannon orbs, arrow mechanic
══════════════════════════════════════════════════════════════ */
let shooterPhase=null;
// shooterPhase = {
//   boss: {x,y,vx,vy,hp,maxHp,angle,hitFlash,dead},
//   cannonOrbs: [{x,y,done,side}×4],   // N/E/S/W
//   arrows: [{x,y,vx,vy,life,trail:[]}],
//   hitParticles: [{x,y,vx,vy,life,ml,col,sz}],
//   done: bool,
//   introT: 0..1  // boss entrance animation
// }

function initShooterPhase(mini=false){
  const cx=AX+AS/2, cy=AY+AS/2;
  const margin=AS*0.08;
  const hp=mini?4:4; // both mini and full boss have 4 HP
  const boss={x:cx,y:cy,vx:rnd(-18,18),vy:rnd(-18,18),hp,maxHp:hp,angle:0,hitFlash:0,dead:false,rotSpd:0.6};
  const cannonOrbs=[
    {x:cx,            y:AY+margin,      done:false,side:'N'},
    {x:AX+AS-margin,  y:cy,             done:false,side:'E'},
    {x:cx,            y:AY+AS-margin,   done:false,side:'S'},
    {x:AX+margin,     y:cy,             done:false,side:'W'},
  ]; // always all 4 orbs
  shooterPhase={boss,cannonOrbs,arrows:[],hitParticles:[],done:false,introT:0,mini};
  if(!mini){grp=null;colls=[];enemies=[];}// real boss only
  addCallout(mini?'MINI SHOOTER':'LOCK ON TARGET',true,mini?'#ff8844':'#ff8800');
  triggerShake(14,0.2);
}

function updateShooterPhase(dt){
  if(!shooterPhase||shooterPhase.done)return;
  const sp=shooterPhase;

  // Intro entrance animation (boss slides in from top)
  if(sp.introT<1){sp.introT=Math.min(1,sp.introT+dt*1.8);return;}

  const b=sp.boss;
  if(!b.dead){
    // Boss drifts slowly, bouncing
    b.angle+=b.rotSpd*dt;
    b.x+=b.vx*dt; b.y+=b.vy*dt;
    const bR=36;
    if(b.x-bR<AX+40){b.x=AX+40+bR;b.vx=Math.abs(b.vx);}
    if(b.x+bR>AX+AS-40){b.x=AX+AS-40-bR;b.vx=-Math.abs(b.vx);}
    if(b.y-bR<AY+40){b.y=AY+40+bR;b.vy=Math.abs(b.vy);}
    if(b.y+bR>AY+AS-40){b.y=AY+AS-40-bR;b.vy=-Math.abs(b.vy);}
    if(b.hitFlash>0)b.hitFlash=Math.max(0,b.hitFlash-dt*4);

    // Player collision
    if(!isInvincible()&&dst(player.x,player.y,b.x,b.y)<CFG.P_RADIUS+bR){killPlayer();return;}
  }

  // Update arrows
  for(let i=sp.arrows.length-1;i>=0;i--){
    const ar=sp.arrows[i];
    ar.x+=ar.vx*dt; ar.y+=ar.vy*dt;
    ar.life-=dt;
    ar.trail.push({x:ar.x,y:ar.y});
    if(ar.trail.length>12)ar.trail.shift();
    // Out of bounds or expired
    if(ar.life<=0||ar.x<AX-20||ar.x>AX+AS+20||ar.y<AY-20||ar.y>AY+AS+20){sp.arrows.splice(i,1);continue;}
    // Hit boss
    if(!b.dead&&dst(ar.x,ar.y,b.x,b.y)<36+8){
      sp.arrows.splice(i,1);
      b.hp--;b.hitFlash=1;
      // Hit particle burst
      for(let j=0;j<22;j++){const a=rnd(0,PI2),s=rnd(60,280);sp.hitParticles.push({x:b.x,y:b.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.3,0.7),ml:0.7,col:j%2===0?'#ff6600':'#ffcc00',sz:rnd(3,8)});}
      pspark(b.x,b.y,'#ff8800',14,80,320,0.3,0.8,3,8);
      pring(b.x,b.y,'#ff4400',b.hp>0?20:8,b.hp>0?300:700,0.4,3);
      triggerShake(b.hp>0?8:45,b.hp>0?0.1:0.35);
      snd('slash_impact');
      if(b.hp<=0){
        b.dead=true;
        sp.cannonOrbs.forEach(o=>o.done=true); // hide remaining orbs immediately
        spawnBossExplosion(b.x,b.y);
        addCallout('TARGET DESTROYED',true,'#00ff88');
        setTimeout(()=>{if(shooterPhase){const _pm=shooterPhase.mini;shooterPhase.done=true;shooterPhase=null;const _pcPts=_pm?100:200;points+=_pcPts;addCallout('PHASE CLEAR',true,'#00ff88');
          _bossPhaseTimer=0;
          if(_pm){ postMiniBossComplete(); } else { const _cnt=Math.max(1,Math.min(phase,3));for(let i=0;i<_cnt;i++)spawnEnemyTop();spawnGroup();playMusic('normal'); }
        }},1400);
      } else {
        // Respawn all 4 orbs for next volley
        sp.cannonOrbs.forEach(o=>o.done=false);
        addCallout('RELOAD!',false,'#ff8800');
      }
      return;
    }
  }

  // Cannon orb collection — player touches orb → fire arrow at boss
  for(const orb of sp.cannonOrbs){
    if(orb.done)continue;
    if(dst(player.x,player.y,orb.x,orb.y)<CFG.P_RADIUS+14){
      orb.done=true;
      snd('collect');
      FX_COLLECT(orb.x,orb.y);
      // Spawn arrow from orb toward boss
      const dx=b.x-orb.x, dy=b.y-orb.y, dist=Math.sqrt(dx*dx+dy*dy)||1;
      const spd=720;
      sp.arrows.push({x:orb.x,y:orb.y,vx:(dx/dist)*spd,vy:(dy/dist)*spd,life:3,trail:[]});
      addCallout('FIRE!',false,'#ff8800');
    }
  }

  // Hit particles
  for(let i=sp.hitParticles.length-1;i>=0;i--){
    const p=sp.hitParticles[i];p.life-=dt;
    if(p.life<=0){sp.hitParticles.splice(i,1);continue;}
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=120*dt;
    p.vx*=0.96;p.vy*=0.96;
  }
}

function drawShooterPhase(ts){
  if(!shooterPhase)return;
  const sp=shooterPhase;
  const b=sp.boss;
  const introEase=sp.introT<1?(1-(1-sp.introT)**3):1;
  const bossDrawY=b.y-(1-introEase)*AS*0.5; // slide in from above

  // Boss
  if(!b.dead){
    const bR=36, pulse=0.88+0.12*Math.sin(ts/100);
    const hpFrac=b.hp/b.maxHp;
    const hitPulse=b.hitFlash>0?b.hitFlash:0;
    X.save();

    // Outer danger ring
    X.strokeStyle=`rgba(255,${Math.floor(60+hpFrac*120)},0,${0.18+0.12*Math.sin(ts/80)})`;
    X.lineWidth=1.5;X.setLineDash([6,8]);X.lineDashOffset=-ts*0.05;
    X.shadowColor='#ff4400';X.shadowBlur=6;
    X.beginPath();X.arc(b.x,bossDrawY,bR+24+Math.sin(ts/120)*4,0,PI2);X.stroke();
    X.setLineDash([]);

    // Rotating spikes (6)
    for(let i=0;i<6;i++){
      const a=b.angle+i*PI2/6;
      X.save();X.translate(b.x,bossDrawY);X.rotate(a);
      X.shadowColor='#ff3300';X.shadowBlur=20;X.fillStyle='#ff2200';
      X.beginPath();X.moveTo(bR,0);X.lineTo(bR+22,-5);X.lineTo(bR+28,0);X.lineTo(bR+22,5);X.closePath();X.fill();
      X.restore();
    }

    // Body glow
    const bodyCol=hitPulse>0?`rgba(255,255,200,${hitPulse*0.8+0.2})`:'#220000';
    const glowCol=hitPulse>0?'#ffffff':'#ff1100';
    X.shadowColor=glowCol;X.shadowBlur=(hitPulse>0?80:38)*pulse;
    X.fillStyle=bodyCol;
    X.beginPath();X.arc(b.x,bossDrawY,bR,0,PI2);X.fill();

    // Inner core rings
    for(let r=0;r<3;r++){
      const ri=bR*(0.75-r*0.22);
      const col=r===0?'#ff3300':r===1?'#ff6600':'#ffaa00';
      X.shadowBlur=10;X.strokeStyle=col;X.lineWidth=2-r*0.4;
      X.beginPath();X.arc(b.x,bossDrawY,ri,0,PI2);X.stroke();
    }
    // Bright center
    X.shadowBlur=0;X.fillStyle='#ffffff';X.beginPath();X.arc(b.x,bossDrawY,bR*0.16,0,PI2);X.fill();

    // HP bar — 4 segments below boss
    const barW=bR*2.4, barH=7, barX=b.x-barW/2, barY=bossDrawY+bR+18;
    X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(barX-2,barY-2,barW+4,barH+4);
    for(let h=0;h<b.maxHp;h++){
      const segW=(barW-3*(b.maxHp-1))/b.maxHp;
      const segX=barX+h*(segW+3);
      const filled=h<b.hp;
      X.fillStyle=filled?'#ff4400':'#1a0000';
      X.shadowColor=filled?'#ff2200':'transparent';X.shadowBlur=filled?8:0;
      X.fillRect(segX,barY,segW,barH);
    }
    X.shadowBlur=0;
    // HP label
    X.font=`bold 9px ${FM}`;X.textAlign='center';X.textBaseline='top';
    X.fillStyle='rgba(255,100,50,0.8)';X.fillText(`HP  ${b.hp} / ${b.maxHp}`,b.x,barY+barH+4);

    X.restore();
  }

  // Cannon orbs
  for(const orb of sp.cannonOrbs){
    if(orb.done)continue;
    const pulse=0.8+0.2*Math.sin(ts/130);
    const col='#ff8800';
    X.save();
    X.shadowColor=col;X.shadowBlur=22*pulse;
    X.fillStyle=col;X.beginPath();X.arc(orb.x,orb.y,14*pulse,0,PI2);X.fill();
    X.shadowBlur=0;X.fillStyle='#fff';X.beginPath();X.arc(orb.x,orb.y,5,0,PI2);X.fill();
    // Direction indicator line toward boss
    if(!b.dead){
      const dx=b.x-orb.x,dy=(b.dead?orb.y:bossDrawY)-orb.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      X.strokeStyle=`rgba(255,136,0,${0.15+0.1*Math.sin(ts/200)})`;X.lineWidth=1.5;X.setLineDash([4,8]);
      X.beginPath();X.moveTo(orb.x,orb.y);X.lineTo(orb.x+dx/d*50,orb.y+dy/d*50);X.stroke();
      X.setLineDash([]);
    }
    // Label
    X.font=`bold 8px ${FM}`;X.textAlign='center';X.textBaseline='middle';
    X.fillStyle='rgba(255,160,80,0.9)';X.shadowColor=col;X.shadowBlur=6;
    X.fillText('FIRE',orb.x,orb.y-22);
    X.restore();
  }

  // Arrows in flight
  for(const ar of sp.arrows){
    const ang=Math.atan2(ar.vy,ar.vx);
    X.save();
    // Trail
    for(let i=0;i<ar.trail.length-1;i++){
      const a=(i/ar.trail.length)*0.6;
      X.strokeStyle=`rgba(255,200,80,${a})`;X.lineWidth=2*(i/ar.trail.length);
      X.beginPath();X.moveTo(ar.trail[i].x,ar.trail[i].y);X.lineTo(ar.trail[i+1].x,ar.trail[i+1].y);X.stroke();
    }
    // Arrow head
    X.translate(ar.x,ar.y);X.rotate(ang);
    X.shadowColor='#ffcc00';X.shadowBlur=24;
    X.fillStyle='#ffdd44';
    X.beginPath();X.moveTo(12,0);X.lineTo(-8,-5);X.lineTo(-5,0);X.lineTo(-8,5);X.closePath();X.fill();
    X.fillStyle='#ffffff';X.shadowBlur=6;
    X.beginPath();X.moveTo(12,0);X.lineTo(2,-2);X.lineTo(2,2);X.closePath();X.fill();
    X.restore();
  }

  // Hit particles
  for(const p of sp.hitParticles){
    const a=p.life/p.ml;X.save();X.globalAlpha=Math.min(1,a*1.4);
    X.fillStyle=p.col;X.shadowColor=p.col;X.shadowBlur=8*a;
    X.beginPath();X.arc(p.x,p.y,p.sz*a,0,PI2);X.fill();X.restore();
  }

  // Intro overlay hint
  if(sp.introT<1||(!b.dead&&sp.cannonOrbs.some(o=>!o.done))){
    X.save();X.textAlign='center';X.textBaseline='top';X.font=`9px ${FM}`;
    X.fillStyle='rgba(255,160,80,0.65)';X.shadowBlur=0;
    X.fillText('COLLECT THE CANNON ORBS TO FIRE AT THE BOSS',AX+AS/2,AY+AS+30);X.restore();
  }
}

const MAN_RAGE_MSGS=[
  "...he noticed you.",
  "...he doesn't like this.",
  "...he's getting annoyed.",
  "...he's getting mad.",
  "...he's really mad now.",
  "...STOP IT.",
  "...STOP STOP STOP!",
  "...HE'S FURIOUS.",
  "...FULL RAGE.",
  "...YOU MADE HIM ANGRY!!",
];

// Synth for man rage scream
function sndManHit(rage){
  try{
    const c=getACtx();
    const f=200+rage*60; // pitch rises with rage
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=rage>7?'sawtooth':'square';
    o.frequency.setValueAtTime(f,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(f*0.4,c.currentTime+0.3);
    g.gain.setValueAtTime(CFG.SFX_VOL*(0.2+rage*0.06),c.currentTime);
    g.gain.exponentialRampToValueAtTime(1e-4,c.currentTime+0.35);
    o.start();o.stop(c.currentTime+0.38);
    // add a higher squeal overtone at high rage
    if(rage>=6){
      const o2=c.createOscillator(),g2=c.createGain();
      o2.connect(g2);g2.connect(c.destination);o2.type='sine';
      o2.frequency.setValueAtTime(800+rage*90,c.currentTime);
      o2.frequency.exponentialRampToValueAtTime(200,c.currentTime+0.5);
      g2.gain.setValueAtTime(CFG.SFX_VOL*0.25,c.currentTime);
      g2.gain.exponentialRampToValueAtTime(1e-4,c.currentTime+0.5);
      o2.start();o2.stop(c.currentTime+0.55);
    }
  }catch(e){}
}
function sndManRoar(){
  try{
    const c=getACtx();
    // Deep roar
    for(const f of[80,120,180]){
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='sawtooth';
      o.frequency.setValueAtTime(f,c.currentTime);
      o.frequency.exponentialRampToValueAtTime(f*0.3,c.currentTime+1.2);
      g.gain.setValueAtTime(CFG.SFX_VOL*0.4,c.currentTime);
      g.gain.exponentialRampToValueAtTime(1e-4,c.currentTime+1.2);
      o.start();o.stop(c.currentTime+1.3);
    }
    // Noise burst
    const sr=c.sampleRate,len=Math.floor(sr*0.5),buf=c.createBuffer(1,len,sr),d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);
    const src=c.createBufferSource(),flt=c.createBiquadFilter(),g=c.createGain();
    src.buffer=buf;flt.type='lowpass';flt.frequency.value=400;
    src.connect(flt);flt.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(CFG.SFX_VOL*0.9,c.currentTime);
    g.gain.exponentialRampToValueAtTime(1e-4,c.currentTime+0.5);
    src.start();src.stop(c.currentTime+0.5);
  }catch(e){}
}

function initManPhase(){
  const cx=AX+AS/2, cy=AY+AS/2;
  const man={
    x:cx,y:cy,rage:0,maxRage:10,
    hover:0,wobble:0,shakeAmt:0,
    raging:false,vx:0,vy:0,
    hitFlash:0,dead:false,
    chaseSpd:CFG.P_MAX_SPEED*0.55,
    ddx:0,ddy:-1,rtimer:0,rt:0.3,
    size:18, // base drawn radius (grows with rage)
  };
  // 10 orbs scattered randomly around the man (not too close, not too far)
  const orbs=[];
  const avoid=[{x:cx,y:cy,r:120}];
  for(let i=0;i<10;i++){
    let ox,oy,tries=0;
    do{
      const ang=rnd(0,PI2),dist=rnd(AS*0.22,AS*0.42);
      ox=cx+Math.cos(ang)*dist; oy=cy+Math.sin(ang)*dist;
      ox=clmp(ox,AX+20,AX+AS-20); oy=clmp(oy,AY+20,AY+AS-20);
      tries++;
    }while(tries<30&&avoid.some(a=>dst(ox,oy,a.x,a.y)<(a.r||50)));
    avoid.push({x:ox,y:oy,r:40});
    orbs.push({x:ox,y:oy,done:false});
  }
  manPhase={man,orbs,arrows:[],particles:[],calloutTimer:0,rageBomb:null,done:false,introT:0};
  grp=null;colls=[];enemies=[];
  addCallout('WHAT IS THAT?',true,'#88ff44');
  triggerShake(40,0.3);
}

function updateManPhase(dt){
  if(!manPhase||manPhase.done)return;
  const sp=manPhase, m=sp.man;

  // Intro
  if(sp.introT<1){sp.introT=Math.min(1,sp.introT+dt*1.4);return;}

  sp.calloutTimer=Math.max(0,sp.calloutTimer-dt);

  // Hover bob
  m.hover=(m.hover||0)+dt;
  if(m.shakeAmt>0)m.shakeAmt=Math.max(0,m.shakeAmt-dt*3);

  if(!m.dead){
    if(m.raging){
      // Chase player
      m.rtimer-=dt;
      if(m.rtimer<=0){
        m.rtimer=m.rt;
        const dx=player.x-m.x,dy=player.y-m.y,d=Math.sqrt(dx*dx+dy*dy)||1;
        m.ddx=dx/d;m.ddy=dy/d;
      }
      m.vx+=m.ddx*CFG.E_ACCEL*dt;m.vy+=m.ddy*CFG.E_ACCEL*dt;
      const ef=Math.exp(-CFG.E_DAMP*dt);m.vx*=ef;m.vy*=ef;
      const spd=Math.sqrt(m.vx**2+m.vy**2);
      if(spd>m.chaseSpd){m.vx=m.vx/spd*m.chaseSpd;m.vy=m.vy/spd*m.chaseSpd;}
      m.x+=m.vx*dt;m.y+=m.vy*dt;
      // Bounce walls
      const R=m.size;
      if(m.x-R<AX){m.x=AX+R;m.vx=Math.abs(m.vx);}
      if(m.x+R>AX+AS){m.x=AX+AS-R;m.vx=-Math.abs(m.vx);}
      if(m.y-R<AY){m.y=AY+R;m.vy=Math.abs(m.vy);}
      if(m.y+R>AY+AS){m.y=AY+AS-R;m.vy=-Math.abs(m.vy);}

      // Player collision while raging (no special immunity)
      if(!isInvincible()&&dst(player.x,player.y,m.x,m.y)<CFG.P_RADIUS+m.size){killPlayer();return;}

      // Bomb pickup kills the man
      if(sp.rageBomb){
        sp.rageBomb.life-=dt;
        if(sp.rageBomb.life<=0)sp.rageBomb=null;
        else if(dst(player.x,player.y,sp.rageBomb.x,sp.rageBomb.y)<CFG.P_RADIUS+16){
          // Activate bomb effect — also mark man as dead
          activatePickup('bomb');
          pickup=null; // override normal pickup slot
          m.dead=true;
          sp.rageBomb=null;
          // Big explosion on man
          spawnBossExplosion(m.x,m.y);
          addCallout('GOT HIM!',true,'#00ff88');
          triggerShake(50,0.4);
          setTimeout(()=>{
            if(manPhase){manPhase.done=true;manPhase=null;points+=200;addCallout('PHASE CLEAR',true,'#00ff88');_bossPhaseTimer=0;const _cnt=Math.max(1,Math.min(phase,3));for(let i=0;i<_cnt;i++)spawnEnemyTop();spawnGroup();playMusic('normal');}
          },1600);
        }
      }
    }

    if(m.hitFlash>0)m.hitFlash=Math.max(0,m.hitFlash-dt*5);

    // Orb collection check
    for(const orb of sp.orbs){
      if(orb.done)continue;
      if(dst(player.x,player.y,orb.x,orb.y)<CFG.P_RADIUS+14){
        orb.done=true;
        snd('collect');FX_COLLECT(orb.x,orb.y);
        // Fire arrow toward man
        const dx=m.x-orb.x,dy=m.y-orb.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
        sp.arrows.push({x:orb.x,y:orb.y,vx:(dx/dist)*680,vy:(dy/dist)*680,life:3,trail:[]});
        addCallout(MAN_RAGE_MSGS[Math.min(m.rage,MAN_RAGE_MSGS.length-1)],false,'#aaff44');
      }
    }
  }

  // Arrows
  for(let i=sp.arrows.length-1;i>=0;i--){
    const ar=sp.arrows[i];
    ar.x+=ar.vx*dt;ar.y+=ar.vy*dt;ar.life-=dt;
    ar.trail.push({x:ar.x,y:ar.y});if(ar.trail.length>12)ar.trail.shift();
    if(ar.life<=0||ar.x<AX-20||ar.x>AX+AS+20||ar.y<AY-20||ar.y>AY+AS+20){sp.arrows.splice(i,1);continue;}
    if(!m.dead&&!m.raging&&dst(ar.x,ar.y,m.x,m.y)<m.size+8){
      sp.arrows.splice(i,1);
      m.rage++;m.hitFlash=1;m.shakeAmt=4+m.rage*1.4;
      sndManHit(m.rage);
      // Rage particles — color gets angrier
      const rageFrac=m.rage/m.maxRage;
      const col=`hsl(${Math.floor(120-rageFrac*120)},100%,55%)`; // green→red
      for(let j=0;j<16;j++){const a=rnd(0,PI2),s=rnd(40,200);sp.particles.push({x:m.x,y:m.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.3,0.7),ml:0.7,col,sz:rnd(2,6)});}
      pspark(m.x,m.y,col,10,50,240,0.2,0.6,2,5);
      triggerShake(10+m.rage*4,0.1+m.rage*0.02);

      if(m.rage>=m.maxRage&&!m.raging){
        // FULL RAGE — go big, green, chase
        m.raging=true;m.size=38;m.chaseSpd=CFG.P_MAX_SPEED*0.72;
        sndManRoar();
        addCallout('HE IS FULLY ENRAGED!!',true,'#ff2200');
        triggerShake(45,0.35);
        // Spawn special bomb
        const bpos=safePos(20,[{x:m.x,y:m.y,r:120},{x:player.x,y:player.y,r:60}]);
        sp.rageBomb={x:bpos.x,y:bpos.y,life:30};
        // burst particles on transform
        for(let j=0;j<50;j++){const a=rnd(0,PI2),s=rnd(80,400);sp.particles.push({x:m.x,y:m.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.5,1.4),ml:1.4,col:j%2===0?'#00ff44':'#88ff00',sz:rnd(3,10)});}
        pring(m.x,m.y,'#00ff44',8,600,0.6,4);
        pring(m.x,m.y,'#ffffff',4,400,0.4,3);
      }
    }
  }

  // Particles
  for(let i=sp.particles.length-1;i>=0;i--){
    const p=sp.particles[i];p.life-=dt;
    if(p.life<=0){sp.particles.splice(i,1);continue;}
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=100*dt;p.vx*=0.96;p.vy*=0.96;
  }
}

function drawManPhase(ts){
  if(!manPhase)return;
  const sp=manPhase, m=sp.man;
  const introEase=sp.introT<1?(1-(1-sp.introT)**3):1;
  const manDrawY=m.y-(1-introEase)*AS*0.6;
  const rageFrac=m.rage/m.maxRage;
  const shk={x:(Math.random()*2-1)*m.shakeAmt,y:(Math.random()*2-1)*m.shakeAmt};
  const mx=m.x+shk.x, my=manDrawY+shk.y;

  if(!m.dead){
    // Rage aura
    if(rageFrac>0){
      const auraR=m.size+(6+rageFrac*22)*(0.8+0.2*Math.sin(ts/60));
      X.save();
      X.globalAlpha=rageFrac*0.35;
      const auraCol=m.raging?'#00ff44':`hsl(${Math.floor(120-rageFrac*120)},100%,50%)`;
      const grad=X.createRadialGradient(mx,my,m.size*0.5,mx,my,auraR);
      grad.addColorStop(0,auraCol);grad.addColorStop(1,'transparent');
      X.fillStyle=grad;X.beginPath();X.arc(mx,my,auraR,0,PI2);X.fill();
      X.globalAlpha=1;X.restore();
    }

    // Draw little man (stick figure style, gets bigger/greener with rage)
    X.save();
    X.translate(mx,my);
    const sz=m.size;
    const bobY=m.raging?0:Math.sin(m.hover*1.8)*5; // hover bob stops when raging
    // Color: white→yellow→orange→red→GREEN(raging)
    const bodyCol=m.raging?'#00ee44':m.hitFlash>0?'#ffffff':`hsl(${Math.floor(120-rageFrac*200)},${Math.floor(40+rageFrac*60)}%,${Math.floor(80-rageFrac*20)}%)`;
    const glowCol=m.raging?'#00ff44':m.hitFlash>0?'#ffffff':`hsl(${Math.floor(120-rageFrac*120)},100%,60%)`;
    X.shadowColor=glowCol;X.shadowBlur=m.raging?(18+14*Math.sin(ts/80)):(8+rageFrac*22);
    X.strokeStyle=bodyCol;X.fillStyle=bodyCol;X.lineWidth=Math.max(1.5,sz*0.1);
    X.lineCap='round';X.lineJoin='round';

    // Head
    const headR=sz*0.38;
    X.beginPath();X.arc(0,bobY-sz*0.6,headR,0,PI2);X.fill();

    // Eyes — get angrier (closer together, furrowed)
    const eyeY=bobY-sz*0.62;const eyeOff=headR*(0.32-rageFrac*0.1);
    X.fillStyle=m.raging?'#ff2200':'#000';X.shadowBlur=0;
    X.beginPath();X.arc(-eyeOff,eyeY,headR*0.18,0,PI2);X.fill();
    X.beginPath();X.arc(eyeOff,eyeY,headR*0.18,0,PI2);X.fill();
    // Furrowed brow at high rage
    if(rageFrac>0.4){
      X.strokeStyle=m.raging?'#ff4400':bodyCol;X.lineWidth=Math.max(1,sz*0.07);X.shadowColor=glowCol;X.shadowBlur=4;
      const browY=eyeY-headR*0.28;const browTilt=(rageFrac-0.4)*0.6*headR;
      X.beginPath();X.moveTo(-eyeOff-headR*0.22,browY+browTilt);X.lineTo(-eyeOff+headR*0.22,browY-browTilt*0.4);X.stroke();
      X.beginPath();X.moveTo(eyeOff-headR*0.22,browY-browTilt*0.4);X.lineTo(eyeOff+headR*0.22,browY+browTilt);X.stroke();
    }
    // Mouth: smile→flat→frown→scream
    X.strokeStyle=bodyCol;X.lineWidth=Math.max(1,sz*0.07);X.shadowColor=glowCol;X.shadowBlur=4;
    const mouthY=eyeY+headR*0.55;
    if(m.raging){
      // Open scream mouth

    X.shadowBlur=0;X.fillStyle='#fff';X.beginPath();X.arc(orb.x,orb.y,4,0,PI2);X.fill();

    X.beginPath();X.moveTo(orb.x,orb.y);X.lineTo(orb.x+dx/d*40,orb.y+dy/d*40);X.stroke();

  }

  // Rage bomb pickup

    X.fillText(timeLeft,rb.x,rb.y+28);

  }

  // Arrows
  for(const ar of sp.arrows){

    X.save();

    X.fillStyle='rgba(255,100,50,0.9)';X.shadowColor='#ff4400';X.shadowBlur=12;
    X.fillText('GRAB THE BOMB — HIT HIM!',AX+AS/2,AY+AS+30);X.restore();
  }
}

let _darkCanvas=null;
function _getDarkCanvas(){
  if(!_darkCanvas||_darkCanvas.width!==LOGI){_darkCanvas=document.createElement('canvas');_darkCanvas.width=LOGI;_darkCanvas.height=LOGI;}
  return _darkCanvas;
}
const DARK_ORBS_TOTAL=5,DARK_REVEAL_EVERY=4.5,DARK_REVEAL_DUR=1.2,DARK_PLAYER_LIGHT=110,DARK_ORB_SIGHT=130,DARK_BOSS_R=38,DARK_CANON_R=28;
function _drkRandPos(margin=80){return{x:rnd(AX+margin,AX+AS-margin),y:rnd(AY+margin,AY+AS-margin)};}
function _drkFarFrom(existing,minD=160,margin=80){for(let a=0;a<60;a++){const p=_drkRandPos(margin);if(existing.every(e=>dst(p.x,p.y,e.x,e.y)>minD))return p;}return _drkRandPos(margin);}

function initDarknessPhase(){
  const cx=AX+AS/2,cy=AY+AS/2;
  const orbPositions=[];
  for(let i=0;i<DARK_ORBS_TOTAL;i++){const p=_drkFarFrom([{x:cx,y:cy},...orbPositions],170);orbPositions.push(p);}
  const orbs=orbPositions.map((p,i)=>({x:p.x,y:p.y,id:i,collected:false,pulse:rnd(0,PI2)}));
  const bossStart=_drkFarFrom([{x:cx,y:cy}],200);
  const canonPos=_drkFarFrom([bossStart,...orbPositions],180);
  darkPhase={introT:0,lightsOutShown:false,orbs,orbsCollected:0,
    boss:{x:bossStart.x,y:bossStart.y,vx:rnd(-40,40),vy:rnd(-40,40),speed:65,revealed:false,revealT:0,revealCooldown:rnd(1.5,2.5),angle:0},
    canon:{x:canonPos.x,y:canonPos.y,active:false,fired:false,chargeT:0},
    darkAlpha:0,lightsOn:false,lightsOnT:0,beamT:0,beamActive:false,done:false,won:false};
  enemies=[];
}

function updateDarknessPhase(dt){
  const sp=darkPhase;if(!sp||sp.done)return;
  if(sp.introT<1){sp.introT=Math.min(1,sp.introT+dt*0.55);sp.darkAlpha=sp.introT*sp.introT;
    if(sp.introT>=0.15&&!sp.lightsOutShown){sp.lightsOutShown=true;snd('phase');addCallout('THE LIGHTS GO OUT',true,'#ffdd66');triggerShake(10,0.2);}return;}
  sp.darkAlpha=1;
  const b=sp.boss;
  if(!b.dead){
    b.angle+=0.9*dt;const bv=Math.sqrt(b.vx**2+b.vy**2)||1;b.vx=b.vx/bv*b.speed;b.vy=b.vy/bv*b.speed;
    b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.x-DARK_BOSS_R<AX){b.x=AX+DARK_BOSS_R;b.vx=Math.abs(b.vx)+rnd(-8,8);}
    if(b.x+DARK_BOSS_R>AX+AS){b.x=AX+AS-DARK_BOSS_R;b.vx=-Math.abs(b.vx)+rnd(-8,8);}
    if(b.y-DARK_BOSS_R<AY){b.y=AY+DARK_BOSS_R;b.vy=Math.abs(b.vy)+rnd(-8,8);}
    if(b.y+DARK_BOSS_R>AY+AS){b.y=AY+AS-DARK_BOSS_R;b.vy=-Math.abs(b.vy)+rnd(-8,8);}
    if(b.revealed){b.revealT-=dt;if(b.revealT<=0){b.revealed=false;b.revealCooldown=rnd(DARK_REVEAL_EVERY-0.5,DARK_REVEAL_EVERY+0.5);}}
    else{b.revealCooldown-=dt;if(b.revealCooldown<=0){b.revealed=true;b.revealT=DARK_REVEAL_DUR;snd('collect');pspark(b.x,b.y,'rgba(200,80,255,0.6)',10,30,120,0.3,0.8,2,5);}}
    if(player&&!player.dead&&!sp.lightsOn&&!isInvincible()&&dst(player.x,player.y,b.x,b.y)<CFG.P_RADIUS+DARK_BOSS_R){FX_DEATH(player.x,player.y);killPlayer();}
  }
  if(sp.lightsOn)sp.lightsOnT+=dt;
  if(!sp.lightsOn&&player&&!player.dead){
    for(const o of sp.orbs){
      if(o.collected)continue;o.pulse+=dt*3;
      if(dst(player.x,player.y,o.x,o.y)<CFG.P_RADIUS+18){
        o.collected=true;sp.orbsCollected++;snd('dark_orb_collect');snd('collect');pspark(o.x,o.y,'#ffdd66',20,60,320,0.3,0.9,2,7);pring(o.x,o.y,'#ffdd66',6,280,0.5,3);triggerShake(20,0.1);
        if(sp.orbsCollected<DARK_ORBS_TOTAL){addCallout(`LIGHT ORB ${sp.orbsCollected}/${DARK_ORBS_TOTAL}`,false,'#ffdd66');}
        else{sp.lightsOn=true;sp.canon.active=true;addCallout('THE DARKNESS RETREATS',true,'#ffffff');addCallout('FLY INTO THE LIGHT CANNON',false,'#ffdd66');triggerShake(25,0.2);}
      }
    }
  }
  if(sp.canon.active&&!sp.canon.fired&&player&&!player.dead){
    const ko=sp.canon;
    if(dst(player.x,player.y,ko.x,ko.y)<CFG.P_RADIUS+DARK_CANON_R){ko.chargeT+=dt;if(ko.chargeT>0.4){ko.fired=true;sp.beamActive=true;sp.beamT=0;snd('light_cannon_shot');snd('explosion');triggerShake(18,0.2);addCallout('LIGHT CANNON FIRED',true,'#ffffff');}}
    else ko.chargeT=Math.max(0,ko.chargeT-dt*3);
  }
  if(sp.beamActive){

    if(sp.beamT>0.35&&!b.dead){b.dead=true;snd('explosion');pspark(b.x,b.y,'#ffffff',60,100,900,0.5,2.0,3,14);pspark(b.x,b.y,'#ffaa44',40,80,700,0.4,1.6,2,10);pring(b.x,b.y,'#ffffff',6,1000,0.8,5);pring(b.x,b.y,'#ffdd66',10,700,1.1,3);triggerShake(18,0.2);addCallout('THE DARKNESS IS DESTROYED',true,'#ffdd66');}
    if(sp.beamT>2.2&&!sp.done){sp.done=true;sp.won=true;darkPhase=null;points+=200;addCallout('PHASE CLEAR',true,'#00ff88');_bossPhaseTimer=0;const _cnt=Math.max(1,Math.min(phase,3));for(let i=0;i<_cnt;i++)spawnEnemyTop();spawnGroup();playMusic('normal');}
  }
}

      ox.globalCompositeOperation='source-over';
    }
    X.save();X.globalAlpha=sp.darkAlpha;X.drawImage(oc,0,0,oc.width,oc.height,0,0,LOGI,LOGI);X.restore();
  }
  if(sp.lightsOn&&sp.lightsOnT<1.8){
    const fade=1-(sp.lightsOnT/1.8);
    const oc=_getDarkCanvas(),ox=oc.getContext('2d');
    ox.clearRect(0,0,oc.width,oc.height);ox.fillStyle='#000008';ox.fillRect(0,0,oc.width,oc.height);
    X.save();X.globalAlpha=fade;X.drawImage(oc,0,0,oc.width,oc.height,0,0,LOGI,LOGI);X.restore();
  }
}

/* ══════════════════════════════════════════════════════════════
   §8c  RECURSION PHASE
══════════════════════════════════════════════════════════════ */
const REC_SHRINK_DUR_BASE=14,REC_MIN_INSET=0.31,REC_BOSS_R=44;
function _getRecSafeRect(inset){return{x:AX+inset,y:AY+inset,w:AS-inset*2,h:AS-inset*2};}

function initRecursionPhase(){
  const cx=AX+AS/2,cy=AY+AS/2,startVeil=AS*0.03;
  recursionPhase={animInset:startVeil,safeX:AX+startVeil,safeY:AY+startVeil,safeW:AS-startVeil*2,safeH:AS-startVeil*2,
    surviveT:0,finalZoneT:0,killOrb:null,dissolveT:0,dissolving:false,done:false,won:false,
    boss:{x:cx,y:cy-AS*0.18,vx:rnd(-55,55),vy:rnd(40,80),angle:0,hitFlash:0,speed:115,dead:false},
    introT:0,introTextShown:false};
  enemies=[];
}

function updateRecursionPhase(dt){
  const sp=recursionPhase;if(!sp||sp.done)return;
  if(sp.introT<1){sp.introT=Math.min(1,sp.introT+dt*0.85);
    if(sp.introT>=1&&!sp.introTextShown){sp.introTextShown=true;addCallout('THE WALLS ARE CLOSING IN',true,'#cc66ff');}return;}
  sp.surviveT+=dt;
  const REC_SHRINK_DUR=Math.max(5,REC_SHRINK_DUR_BASE-Math.floor(phase/10)*1.5);
  const startVeil=AS*0.03,maxInset=AS*REC_MIN_INSET,progress=Math.min(1,sp.surviveT/REC_SHRINK_DUR),eased=progress*progress;
  sp.animInset=startVeil+(maxInset-startVeil)*eased;
  const sr=_getRecSafeRect(sp.animInset);sp.safeX=sr.x;sp.safeY=sr.y;sp.safeW=sr.w;sp.safeH=sr.h;
  const b=sp.boss;
  if(!b.dead){
    b.angle+=1.2*dt;const bSpd=b.speed*(1+eased*0.5),bv=Math.sqrt(b.vx**2+b.vy**2)||1;
    b.vx=b.vx/bv*bSpd;b.vy=b.vy/bv*bSpd;b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.x-REC_BOSS_R<sp.safeX){b.x=sp.safeX+REC_BOSS_R;b.vx=Math.abs(b.vx);}
    if(b.x+REC_BOSS_R>sp.safeX+sp.safeW){b.x=sp.safeX+sp.safeW-REC_BOSS_R;b.vx=-Math.abs(b.vx);}
    if(b.y-REC_BOSS_R<sp.safeY){b.y=sp.safeY+REC_BOSS_R;b.vy=Math.abs(b.vy);}
    if(b.y+REC_BOSS_R>sp.safeY+sp.safeH){b.y=sp.safeY+sp.safeH-REC_BOSS_R;b.vy=-Math.abs(b.vy);}
    if(b.hitFlash>0)b.hitFlash=Math.max(0,b.hitFlash-dt*4);
  }
  if(!b.dead&&player&&!player.dead&&!isInvincible()&&dst(player.x,player.y,b.x,b.y)<CFG.P_RADIUS+REC_BOSS_R){FX_DEATH(player.x,player.y);killPlayer();return;}
  if(player&&!player.dead&&!sp.dissolving){
    if(!isInvincible()&&(player.x-CFG.P_RADIUS<sp.safeX||player.x+CFG.P_RADIUS>sp.safeX+sp.safeW||player.y-CFG.P_RADIUS<sp.safeY||player.y+CFG.P_RADIUS>sp.safeY+sp.safeH)){FX_DEATH(player.x,player.y);killPlayer();return;}
  }
  const wallsDone=sp.surviveT>=Math.max(5,REC_SHRINK_DUR_BASE-Math.floor(phase/10)*1.5);
  if(wallsDone&&!sp.killOrb&&!sp.won){
    sp.finalZoneT+=dt;
    if(sp.finalZoneT>=10){
      const corners=[{x:sp.safeX+40,y:sp.safeY+40},{x:sp.safeX+sp.safeW-40,y:sp.safeY+40},{x:sp.safeX+40,y:sp.safeY+sp.safeH-40},{x:sp.safeX+sp.safeW-40,y:sp.safeY+sp.safeH-40}];
      corners.sort((a,b2)=>dst(b.x,b.y,b2.x,b2.y)-dst(b.x,b.y,a.x,a.y));
      sp.killOrb={x:corners[0].x,y:corners[0].y,pulse:0};addCallout('A WEAKNESS APPEARS',true,'#ffffff');triggerShake(12,0.12);
    }
  }
  if(sp.killOrb&&player&&!player.dead){
    sp.killOrb.pulse+=dt;
    if(dst(player.x,player.y,sp.killOrb.x,sp.killOrb.y)<CFG.P_RADIUS+18){
      sp.killOrb=null;sp.won=true;sp.dissolving=true;b.dead=true;
      pspark(b.x,b.y,'#cc66ff',70,100,900,0.5,2.0,3,14);pspark(b.x,b.y,'#ffffff',30,60,500,0.3,1.2,2,8);
      pring(b.x,b.y,'#ffffff',6,950,0.8,5);pring(b.x,b.y,'#cc66ff',10,650,1.1,3);
      triggerShake(50,0.35);snd('explosion');addCallout('THE RECURSION SHATTERS',true,'#cc66ff');
    }
  }
  if(sp.dissolving){sp.dissolveT+=dt;if(sp.dissolveT>2.0&&!sp.done){sp.done=true;recursionPhase=null;points+=200;addCallout('PHASE CLEAR',true,'#00ff88');_bossPhaseTimer=0;const _cnt=Math.max(1,Math.min(phase,3));for(let i=0;i<_cnt;i++)spawnEnemyTop();spawnGroup();playMusic('normal');}}
}

function drawRecursionPhase(ts){
  const sp=recursionPhase;if(!sp)return;
  const introEase=sp.introT<1?(1-(1-sp.introT)**3):1;
  const dissolveAlpha=sp.dissolving?Math.max(0,1-sp.dissolveT/1.4):1;
  const inset=sp.animInset*introEase;
  if(inset>1){
    const panels=[{x:AX,y:AY,w:AS,h:inset},{x:AX,y:AY+AS-inset,w:AS,h:inset},{x:AX,y:AY+inset,w:inset,h:AS-inset*2},{x:AX+AS-inset,y:AY+inset,w:inset,h:AS-inset*2}];
    for(const p of panels){X.save();X.globalAlpha=dissolveAlpha;X.fillStyle='rgba(30,0,50,0.94)';X.fillRect(p.x,p.y,p.w,p.h);const ga=0.1+0.25*(sp.animInset/(AS*REC_MIN_INSET));X.fillStyle=`rgba(180,60,255,${ga})`;X.fillRect(p.x,p.y,p.w,p.h);X.restore();}
    X.save();X.globalAlpha=dissolveAlpha;X.strokeStyle='rgba(160,60,255,0.75)';X.lineWidth=3;X.shadowColor='#aa44ff';X.shadowBlur=20;X.strokeRect(AX+inset,AY+inset,AS-inset*2,AS-inset*2);
    X.setLineDash([8,14]);X.lineDashOffset=-ts*0.04;X.strokeStyle='rgba(200,120,255,0.35)';X.lineWidth=1.5;X.shadowBlur=0;X.strokeRect(AX+inset+4,AY+inset+4,AS-inset*2-8,AS-inset*2-8);X.setLineDash([]);X.restore();
  }
  if(!sp.boss.dead){
    const b=sp.boss,pulse=0.88+0.12*Math.sin(ts/100),bCol=b.hitFlash>0?'#ffffff':'#8800cc',glowCol=b.hitFlash>0?'#ffffff':'#aa44ff';
    X.save();for(let i=2;i>=1;i--){X.globalAlpha=0.12*pulse*(3-i)/2;X.fillStyle='#aa44ff';X.beginPath();X.arc(b.x,b.y,REC_BOSS_R+i*20,0,PI2);X.fill();}
    X.globalAlpha=1;X.shadowColor=glowCol;X.shadowBlur=20;
    for(let i=0;i<6;i++){const a=b.angle+i*PI2/6;X.strokeStyle=bCol;X.lineWidth=4;X.beginPath();X.moveTo(b.x+Math.cos(a)*(REC_BOSS_R-4),b.y+Math.sin(a)*(REC_BOSS_R-4));X.lineTo(b.x+Math.cos(a)*(REC_BOSS_R+20),b.y+Math.sin(a)*(REC_BOSS_R+20));X.stroke();}
    X.shadowBlur=36*pulse;X.fillStyle=bCol;X.beginPath();X.arc(b.x,b.y,REC_BOSS_R,0,PI2);X.fill();
    for(let r=0;r<3;r++){const ri=REC_BOSS_R*(0.75-r*0.22),rc=r===0?'#cc55ff':r===1?'#9922ee':'#6600aa';X.strokeStyle=rc;X.lineWidth=2-r*0.4;X.shadowBlur=8;X.beginPath();X.arc(b.x,b.y,ri,0,PI2);X.stroke();}
    X.restore();
  }
  if(sp.killOrb){
    const ko=sp.killOrb,p=0.7+0.3*Math.sin(ko.pulse*4);
    X.save();X.shadowColor='#ffffff';X.shadowBlur=30*p;X.strokeStyle=`rgba(255,255,255,${0.5+0.3*p})`;X.lineWidth=2;X.beginPath();X.arc(ko.x,ko.y,28*p,0,PI2);X.stroke();
    X.shadowColor='#cc66ff';X.shadowBlur=40*p;X.fillStyle='#cc66ff';X.beginPath();X.arc(ko.x,ko.y,16,0,PI2);X.fill();
    X.fillStyle='#ffffff';X.shadowBlur=10;X.beginPath();X.arc(ko.x,ko.y,7,0,PI2);X.fill();
    X.shadowBlur=0;X.font=`bold 9px ${FM}`;X.fillStyle='#ffffff';X.textAlign='center';X.textBaseline='bottom';X.fillText('DESTROY',ko.x,ko.y-32);X.restore();
  }
  // Timer bar
  const cx=AX+AS/2,dynDur=Math.max(5,REC_SHRINK_DUR_BASE-Math.floor(phase/10)*1.5),wallsDone2=sp.surviveT>=dynDur,bw=AS*0.6,bh=8,bx=cx-bw/2,by=AY-26;
  X.save();X.fillStyle='rgba(0,0,0,0.55)';X.fillRect(bx-2,by-2,bw+4,bh+4);
  if(!wallsDone2){const fr=Math.min(1,sp.surviveT/dynDur);X.fillStyle='rgba(180,60,255,0.8)';X.shadowColor='#aa44ff';X.shadowBlur=10;X.fillRect(bx,by,bw*fr,bh);X.shadowBlur=0;X.font=`9px ${FM}`;X.textAlign='center';X.textBaseline='bottom';X.fillStyle='rgba(200,150,255,0.8)';X.fillText('WALLS CLOSING',cx,by-4);}
  else if(!sp.killOrb&&!sp.won){const fr2=Math.min(1,sp.finalZoneT/10);X.fillStyle='rgba(255,220,80,0.85)';X.shadowColor='#ffdd44';X.shadowBlur=10;X.fillRect(bx,by,bw*fr2,bh);X.shadowBlur=0;X.font=`9px ${FM}`;X.textAlign='center';X.textBaseline='bottom';X.fillStyle='rgba(255,230,150,0.85)';X.fillText(`WEAKNESS FORMING  ${Math.ceil(10-sp.finalZoneT)}s`,cx,by-4);}
  else if(sp.killOrb){X.fillStyle='rgba(200,100,255,0.9)';X.shadowColor='#cc66ff';X.shadowBlur=14;X.fillRect(bx,by,bw,bh);X.shadowBlur=0;X.font=`bold 9px ${FM}`;X.textAlign='center';X.textBaseline='bottom';X.fillStyle='#ffffff';X.fillText('GRAB THE ORB',cx,by-4);}
  X.restore();
}

// Two mini bosses: 'shooter' (mini cannon boss) and 'slasher' (3-dot slash boss)

function spawnMiniBoss(){
  const type=Math.random()<0.5?'shooter':'slasher';
  if(type==='shooter') initShooterPhase(true);
  else initSlashPhase(true);
  // mini boss does NOT change music — stays as normal phase track
}

function updateMiniBoss(dt){ /* mini bosses reuse shooterPhase / slashPhase logic — miniBossActive is just a flag */ }
function drawMiniBoss(ts){ /* drawing handled by existing drawShooterPhase / drawSlashPhase */ }

// Called when a mini boss dies — handles the case where orbs were already collected
// during mini boss activity and phase is sitting on a boss boundary
function postMiniBossComplete(){
  // Mini boss died — normal phase continues; orbs were NOT cleared so just announce kill
  miniBossActive=null;
  addCallout('MINI BOSS DEAD',false,'#ff8844');
  snd('mini_boss_kill');
  // If orbs are already gone, spawn a fresh group so the player isn't stranded
  if(!grp||colls.every(c=>c.done)){spawnGroup();}
}

/* ══════════════════════════════════════════════════════════════
   §9  SPAWN / INIT
══════════════════════════════════════════════════════════════ */
function safePos(r,avoid){
  const m=r+28,minD=AS*0.42;
  for(let i=0;i<200;i++){
    let x,y;
    if(i<150){const side=Math.floor(rnd(0,4)),band=AS*0.28;if(side===0){x=rnd(AX+m,AX+band);y=rnd(AY+m,AY+AS-m);}else if(side===1){x=rnd(AX+AS-band,AX+AS-m);y=rnd(AY+m,AY+AS-m);}else if(side===2){x=rnd(AX+m,AX+AS-m);y=rnd(AY+m,AY+band);}else{x=rnd(AX+m,AX+AS-m);y=rnd(AY+AS-band,AY+AS-m);}}
    else{x=rnd(AX+m,AX+AS-m);y=rnd(AY+m,AY+AS-m);}
    if(!player||dst(x,y,player.x,player.y)<minD)continue;
    let ok=true;for(const a of avoid)if(dst(x,y,a.x,a.y)<(a.r||65)){ok=false;break;}
    if(ok)return{x,y};
  }
  return{x:AX+AS*0.9,y:AY+AS*0.1};
}

function init(){
  Object.keys(KEYS).forEach(k=>KEYS[k]=false);
  resize();
  MODE='play';score=0;phase=1;points=0;survivalTime=0;_matrixDigitsTimer=0;
  deadTimer=0;deadAge=0;_lastPuBucket=0;_bossPhaseTimer=0;
  player={x:AX+AS/2,y:AY+AS/2,vx:0,vy:0,trail:[]};
  enemies=[];colls=[];grp=null;pickup=null;effect=null;parts=[];callouts=[];popups=[];
  matrixParts=[];pillTimer=0;wrapFlash=[];deferredFX=[];
  matrixState=null;matrixLines=[];matrixGlitch=0;matrixGlitchTimer=0;poisonPills=[];
  redPillActive=false;redPillPhasesLeft=0;redPillSpeedMult=1;_redPillSafeFrames=0;
  matrixPortal=null;_portalAngle=0;portalTransition=null;diedInMatrix=false;slashPhase=null;shooterPhase=null;manPhase=null;
  darkPhase=null;recursionPhase=null;miniBossActive=null;bossPhaseIndex=0;_bossPortal=null;_paused=false;_wallWarp=[];
  orbStreak=0;
  // Reset per-game state — but KEEP room/party info (_guestInputs, _mpMode, LOBBY etc.)
  // so the host knows who's in the session and guests are recognized immediately.
  _remotePlayers=[];_playerDead={};_reviveTimer={};_guestEnemies={};
  // Pre-populate _remotePlayers from LOBBY so they exist before first input arrives
  if(_mpMode==='host'){
    for(const idxStr in _guestInputs){
      const idx=+idxStr;
      const pInfo=LOBBY[idx]||{};
      _remotePlayers[idx]={idx,x:AX+AS/2,y:AY+AS/2,vx:0,vy:0,trail:[],
        name:pInfo.name||'P'+(idx+1),color:pInfo.color||PLAYER_COLORS[idx%PLAYER_COLORS.length],dead:false,rv:0};
    }
  }
  spawnEnemyTop();spawnGroup();
  resetOrbSounds();
  playMusic('normal');
}

function spawnEnemyTop(){
  // Spawn in top 20% of arena, blinking/safe for 2 seconds
  const m=CFG.E_RADIUS+20;
  const x=AX+m+Math.random()*(AS-m*2);
  const y=AY+m+Math.random()*(AS*0.20);
  enemies.push({x,y,vx:0,vy:0,spd:CFG.P_MAX_SPEED*rnd(CFG.E_SPEED_MIN,CFG.E_SPEED_MAX)*redPillSpeedMult,rt:rnd(CFG.E_REACT_MIN,CFG.E_REACT_MAX),rtimer:rnd(0,0.18),ddx:0,ddy:1,slowT:0,dimDir:null,spawnAge:0,spawnSafe:2.0});
}

function spawnEnemy(){
  const av=enemies.map(e=>({x:e.x,y:e.y,r:90}));
  const p=safePos(CFG.E_RADIUS,av);
  enemies.push({x:p.x,y:p.y,vx:0,vy:0,spd:CFG.P_MAX_SPEED*rnd(CFG.E_SPEED_MIN,CFG.E_SPEED_MAX)*redPillSpeedMult,rt:rnd(CFG.E_REACT_MIN,CFG.E_REACT_MAX),rtimer:rnd(0,0.18),ddx:0,ddy:-1,slowT:0,dimDir:null,spawnAge:0,spawnSafe:2.0});
}

function advancePhase(){
  phase++;
  if(redPillActive&&redPillPhasesLeft>0){redPillPhasesLeft--;if(redPillPhasesLeft<=0){redPillActive=false;redPillSpeedMult=1;}}
  const inBossPhase=(slashPhase&&!slashPhase.mini)||(shooterPhase&&!shooterPhase.mini)||manPhase||darkPhase||recursionPhase||matrixState;
  if(!inBossPhase&&phase%10===0){
    // Portal spawns like a powerup — enemies and orbs continue normally
    const idx=bossPhaseIndex%5; bossPhaseIndex++;
    addCallout('PHASE '+phase,true,'#ffcc00');snd('phase');FX_PHASE();
    _bossPhaseTimer=60;
    const ppos=safePos(50,[{x:player.x,y:player.y,r:100}]);
    const _pTypes=['matrix','slash','darkness','recursion','man'];
    const _pCols=['#00ff44','#ff2244','#330022','#cc66ff','#44ff44'];
    if(idx===0){
      matrixPortal={x:ppos.x,y:ppos.y,life:10,maxLife:10};_portalAngle=0;
      addCallout('SIMULATION PORTAL',false,POISON.MATRIX_COL,true);
      snd('portal_matrix'); snd('portal_open');
    } else {
      _bossPortal={type:_pTypes[idx],x:ppos.x,y:ppos.y,countdown:15,angle:0,col:_pCols[idx]};
      snd('portal_'+_pTypes[idx]); snd('portal_open');
      addCallout('ENTER THE PORTAL',false,_pCols[idx]);
    }
    // Continue phase normally — spawn orbs and enemies alongside the portal
    playMusic('normal');
    spawnGroup();
    spawnEnemyTop();
    if(redPillActive)spawnEnemyTop();
    return;
  }
  if(!inBossPhase){
    playMusic('normal'); // resume normal music on each regular phase
    spawnGroup();
    spawnEnemyTop();
    if(redPillActive)spawnEnemyTop();
    if(phase%10!==0&&Math.random()<0.10)spawnMiniBoss();
  }
}

function endBossPhase(){
  if(slashPhase){slashPhase.done=true;slashPhase=null;}
  if(shooterPhase){shooterPhase.done=true;shooterPhase=null;}
  if(manPhase){manPhase.done=true;manPhase=null;}
  if(darkPhase){darkPhase.done=true;darkPhase=null;}
  if(recursionPhase){recursionPhase.done=true;recursionPhase=null;}
  if(matrixState){matrixState=null;matrixLines=[];poisonPills=[];}
  _bossPhaseTimer=0;
  enemies=[];
  const cnt=Math.max(1,Math.min(phase,3));
  for(let i=0;i<cnt;i++)spawnEnemyTop();
  spawnGroup();
  playMusic('normal');
  addCallout('PHASE CLEAR',true,'#00ff88');
}

function _spawnPickupNow(){
  const types=Object.keys(CFG.PU_COL);
  const type=types[Math.floor(Math.random()*types.length)];
  const av=[...enemies.map(e=>({x:e.x,y:e.y,r:60})),...colls.filter(c=>!c.done).map(c=>({x:c.x,y:c.y,r:35}))];
  const p=safePos(CFG.PU_RADIUS,av);
  pickup={x:p.x,y:p.y,type,life:CFG.PU_LIFE};
}

function spawnGroup(){
  if((slashPhase&&!slashPhase.mini)||(shooterPhase&&!shooterPhase.mini)||manPhase||darkPhase||recursionPhase)return;
  const n=Math.min(CFG.ORB_MAX,Math.max(1,CFG.ORB_BASE+Math.floor(Math.sqrt(phase*CFG.ORB_LOG_K))));
  const av=enemies.map(e=>({x:e.x,y:e.y,r:60}));
  colls=[];
  for(let i=0;i<n;i++){const p=safePos(CFG.C_RADIUS,[...av,...colls.map(c=>({x:c.x,y:c.y,r:38}))]);colls.push({x:p.x,y:p.y,done:false});}
  const t=CFG.GROUP_TIMES[Math.min(n,CFG.GROUP_TIMES.length-1)];
  grp={timer:t,maxT:t,n};
  resetOrbSounds(); // reset orb sequence for each new group
}




function activatePickup(type){
  FX_POWERUP(player.x,player.y,CFG.PU_COL[type]);
  snd('pickup_'+type); // individual per-powerup sound
  snd('powerup');      // generic fallback if specific not found
  addCallout(CFG.PU_LABEL[type],false,CFG.PU_COL[type]);
  effect={type,t:CFG.PU_DUR[type],maxT:CFG.PU_DUR[type]};
  if(type==='freeze')FX_FREEZE();if(type==='fear')FX_FEAR();if(type==='invincible')snd('invincible_start');if(type==='freeze')snd('freeze_start');
}

function addFloatText(txt,x,y,col){
  popups.push({txt,x,y,col:col||'#ffffff',t:1.1,maxT:1.1,vy:-60});
}

function addCallout(txt,drama,col='#ffffff',matrix=false){
  const dur=drama?2.5:1.9;
  const hasOther=callouts.some(c=>c.t>0);
  const side=hasOther?(Math.random()<0.5?1:-1):0;

// ── Global invincibility helper ──────────────────────────────
function isInvincible(){
  // Downed players in MP are immune (prevents re-triggering death)
  if(_mpMode==='host'  && _playerDead[0]) return true;
  if(_mpMode==='guest' && _playerDead[_myPlayerIdx]) return true;
  return !!(effect&&(effect.type==='invincible'||effect.type==='bomb'))||!!slashPhase?.cin;
}

function killPlayer(){
  if(MODE==='dead')return;
  // ── Multiplayer (HOST): mark local player downed, keep game alive if partner alive ──
  if(_mpMode==='host' && Object.keys(_guestInputs).length>0){
    if(_playerDead[0])return; // already downed
    _playerDead[0]=true;
    diedInMatrix=!!matrixState;
    matrixState=null;matrixLines=[];poisonPills=[];matrixGlitch=0;matrixGlitchTimer=0;
    redPillActive=false;redPillPhasesLeft=0;redPillSpeedMult=1;
    FX_DEATH(player.x,player.y);snd('death');
    if(survivalTime>BEST)BEST=survivalTime;
    const allDead=Object.keys(_guestInputs).every(i=>_playerDead[+i]);
    if(allDead){
      stopMusic();deadTimer=DEAD_DELAY;deadAge=0;MODE='dead';
      _socket?.emit('game_over',{pts:points,st:survivalTime,ph:phase});
    } else {
      addCallout('PILOT DOWN \u2014 REVIVE?',false,'#888888');
    }
    return;
  }
  // ── Solo or Guest ──
  diedInMatrix=!!matrixState;
  matrixState=null;matrixLines=[];poisonPills=[];matrixGlitch=0;matrixGlitchTimer=0;
  redPillActive=false;redPillPhasesLeft=0;redPillSpeedMult=1;
  FX_DEATH(player.x,player.y);snd('death');
  stopMusic();
  if(survivalTime>BEST)BEST=survivalTime;
  deadTimer=DEAD_DELAY;deadAge=0;MODE='dead';
}

/** HOST: kill a guest player by index. Checks if all players are now dead. */
function _killGuestPlayer(idx){
  if(_playerDead[idx])return;
  _playerDead[idx]=true;
  const gp=_remotePlayers[idx];
  if(gp){FX_DEATH(gp.x,gp.y);snd('death');}
  const allDead=_playerDead[0]&&Object.keys(_guestInputs).every(i=>_playerDead[+i]);
  if(allDead){
    if(survivalTime>BEST)BEST=survivalTime;
    stopMusic();deadTimer=DEAD_DELAY;deadAge=0;MODE='dead';
    _socket?.emit('game_over',{pts:points,st:survivalTime,ph:phase});
  } else {
    addCallout('PILOT DOWN \u2014 REVIVE?',false,'#888888');
  }
}
function gameUpdate(dt,ts){
  const _rawDt=dt;
  if(slashPhase&&slashPhase.cin&&slashPhase.gameTimeScale<1.0)dt=dt*slashPhase.gameTimeScale;
  for(let i=deferredFX.length-1;i>=0;i--){deferredFX[i].t-=dt;if(deferredFX[i].t<=0){deferredFX[i].fn();deferredFX.splice(i,1);}}

  // Survival timer only
  survivalTime+=dt;

  // Points-based powerup spawning — every 500 pts
  if(!pickup&&!effect){
    const bucket=Math.floor(points/500);
    if(bucket>(_lastPuBucket||0)){_lastPuBucket=bucket;_spawnPickupNow();}
  }

  // Boss phase timeout
  if(_bossPhaseTimer>0){
    _bossPhaseTimer-=dt;
    if(_bossPhaseTimer<=0){_bossPhaseTimer=0;endBossPhase();}
  }

  // Player movement — frozen when host is downed in MP (ghost stays in place)
  if(!(_playerDead[0]&&_mpMode==='host')){
    let ax=0,ay=0;
    if(KEYS['ArrowLeft']||KEYS['a']||KEYS['A'])ax-=CFG.P_ACCEL;
    if(KEYS['ArrowRight']||KEYS['d']||KEYS['D'])ax+=CFG.P_ACCEL;
    if(KEYS['ArrowUp']||KEYS['w']||KEYS['W'])ay-=CFG.P_ACCEL;
    if(KEYS['ArrowDown']||KEYS['s']||KEYS['S'])ay+=CFG.P_ACCEL;
    player.vx+=ax*dt;player.vy+=ay*dt;
    const pf=Math.exp(-CFG.P_DAMP*dt);player.vx*=pf;player.vy*=pf;
    const ps=Math.sqrt(player.vx**2+player.vy**2);
    if(ps>CFG.P_MAX_SPEED){player.vx=player.vx/ps*CFG.P_MAX_SPEED;player.vy=player.vy/ps*CFG.P_MAX_SPEED;}
    player.x+=player.vx*dt;player.y+=player.vy*dt;

    // Trail
    player.trail.push({x:player.x,y:player.y,ts});
    while(player.trail.length>CFG.TRAIL_MAX_PTS)player.trail.shift();
    const cutoff=ts-CFG.TRAIL_DURATION*1000;
    while(player.trail.length>0&&player.trail[0].ts<cutoff)player.trail.shift();

    // Wall
    const inv=effect?.type==='invincible';
    if(CFG.WRAP_WALLS){
      if(player.x-CFG.P_RADIUS<AX){player.x=AX+AS-CFG.P_RADIUS;wrapFlash.push({side:'R',t:0,dur:0.45});_wallWarp.push({side:'L',t:0.5,dur:0.5,x:AX,y:player.y});snd('wall_pass');}
      if(player.x+CFG.P_RADIUS>AX+AS){player.x=AX+CFG.P_RADIUS;wrapFlash.push({side:'L',t:0,dur:0.45});_wallWarp.push({side:'R',t:0.5,dur:0.5,x:AX+AS,y:player.y});snd('wall_pass');}
      if(player.y-CFG.P_RADIUS<AY){player.y=AY+AS-CFG.P_RADIUS;wrapFlash.push({side:'B',t:0,dur:0.45});_wallWarp.push({side:'T',t:0.5,dur:0.5,x:player.x,y:AY});snd('wall_pass');}
      if(player.y+CFG.P_RADIUS>AY+AS){player.y=AY+CFG.P_RADIUS;wrapFlash.push({side:'T',t:0,dur:0.45});_wallWarp.push({side:'B',t:0.5,dur:0.5,x:player.x,y:AY+AS});snd('wall_pass');}
    }else if(!inv){
      if(player.x-CFG.P_RADIUS<AX||player.x+CFG.P_RADIUS>AX+AS||player.y-CFG.P_RADIUS<AY||player.y+CFG.P_RADIUS>AY+AS){killPlayer();return;}
    }
  }

  // Enemies
  const frz=effect?.type==='freeze',slw=effect?.type==='slowed',fear=effect?.type==='fear',dim=effect?.type==='dimshift';
  const freezeAll=frz; // only freeze powerup freezes enemies, NOT matrix pills
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    e.spawnAge=(e.spawnAge||0)+dt; // track age for spawn blink/safe window
    if(freezeAll){e.vx*=0.85;e.vy*=0.85;continue;}
    let sm=slw?CFG.SLOW_FACTOR:1;if(e.slowT>0){e.slowT-=dt;sm=Math.min(sm,0.2);}
    if(dim){if(!e.dimDir){const a=rnd(0,PI2);e.dimDir={x:Math.cos(a),y:Math.sin(a)};}e.vx+=e.dimDir.x*CFG.E_ACCEL*dt;e.vy+=e.dimDir.y*CFG.E_ACCEL*dt;}
    else if(fear){const dx=e.x-player.x,dy=e.y-player.y,d=Math.sqrt(dx*dx+dy*dy)||1;e.vx+=dx/d*CFG.E_ACCEL*dt;e.vy+=dy/d*CFG.E_ACCEL*dt;}
    else{e.rtimer-=dt;if(e.rtimer<=0){e.rtimer=e.rt;const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1;e.ddx=dx/d;e.ddy=dy/d;}e.vx+=e.ddx*CFG.E_ACCEL*sm*dt;e.vy+=e.ddy*CFG.E_ACCEL*sm*dt;}
    const ef=Math.exp(-CFG.E_DAMP*dt);e.vx*=ef;e.vy*=ef;
    const es=Math.sqrt(e.vx**2+e.vy**2),em=dim?CFG.P_MAX_SPEED*0.7:e.spd*sm;
    if(es>em&&es>0){e.vx=e.vx/es*em;e.vy=e.vy/es*em;}
    e.x+=e.vx*dt;e.y+=e.vy*dt;
    let wh=false;
    if(e.x-CFG.E_RADIUS<AX){e.x=AX+CFG.E_RADIUS;if(dim){e.vx=Math.abs(e.vx);if(e.dimDir)e.dimDir.x=Math.abs(e.dimDir.x);}else if(fear)wh=true;else e.vx=Math.abs(e.vx)*0.4;}
    if(e.x+CFG.E_RADIUS>AX+AS){e.x=AX+AS-CFG.E_RADIUS;if(dim){e.vx=-Math.abs(e.vx);if(e.dimDir)e.dimDir.x=-Math.abs(e.dimDir.x);}else if(fear)wh=true;else e.vx=-Math.abs(e.vx)*0.4;}
    if(e.y-CFG.E_RADIUS<AY){e.y=AY+CFG.E_RADIUS;if(dim){e.vy=Math.abs(e.vy);if(e.dimDir)e.dimDir.y=Math.abs(e.dimDir.y);}else if(fear)wh=true;else e.vy=Math.abs(e.vy)*0.4;}
    if(e.y+CFG.E_RADIUS>AY+AS){e.y=AY+AS-CFG.E_RADIUS;if(dim){e.vy=-Math.abs(e.vy);if(e.dimDir)e.dimDir.y=-Math.abs(e.dimDir.y);}else if(fear)wh=true;else e.vy=-Math.abs(e.vy)*0.4;}
    if(fear&&wh){points+=CFG.SCORE_PER_KILL;addFloatText('+'+CFG.SCORE_PER_KILL,e.x,e.y,'#ff44ff');FX_ENEMY_DEATH(e.x,e.y);snd('enemy_death');enemies.splice(i,1);}
  }

  // Enemy collision with player
  if(!matrixState){
    const _inv=isInvincible();
    const _dim=effect?.type==='dimshift';
    const _bomb=effect?.type==='bomb';
    if(_dim){
      for(let i=enemies.length-1;i>=0;i--)if((enemies[i].spawnAge||0)>=1.5&&dst(player.x,player.y,enemies[i].x,enemies[i].y)<CFG.P_RADIUS+CFG.E_RADIUS){points+=CFG.SCORE_PER_KILL;addFloatText('+'+CFG.SCORE_PER_KILL,enemies[i].x,enemies[i].y,'#dd44ff');FX_ENEMY_DEATH(enemies[i].x,enemies[i].y);snd('enemy_death');enemies.splice(i,1);}
    } else if(!_inv&&!_bomb&&_redPillSafeFrames<=0){
      for(const e of enemies)if((e.spawnAge||0)>=1.5&&dst(player.x,player.y,e.x,e.y)<CFG.P_RADIUS+CFG.E_RADIUS){killPlayer();return;}
    }
    // Guest enemy collisions are handled in _mpUpdateGuestPlayers via _guestEnemies
  }
  if(_redPillSafeFrames>0)_redPillSafeFrames--;
  if(MODE!=='play')return;

  // Orbs — run during mini bosses (only blocked by real boss phases)
  // Both the host player AND all connected guests can collect orbs.
  if(grp&&!(slashPhase&&!slashPhase.mini)&&!(shooterPhase&&!shooterPhase.mini)&&!manPhase){
    const mag=effect?.type==='magnet',magR=CFG.P_RADIUS*CFG.MAGNET_RFACTOR;
    const orbR=CFG.C_RADIUS*(1+orbStreak*0.2), orbPts=CFG.SCORE_PER_COLL+orbStreak*10;
    // Build list of active (alive) player positions to check this frame
    const _collectors=[];
    if(!(_playerDead[0]&&_mpMode==='host'))_collectors.push({x:player.x,y:player.y,isHost:true});
    if(_mpMode==='host'){
      for(const ri in _guestInputs){
        const ridx=+ri,gp=_remotePlayers[ridx];
        if(gp&&!_playerDead[ridx])_collectors.push({x:gp.x,y:gp.y,isHost:false});
      }
    }
    for(const c of colls){
      if(c.done)continue;
      for(const pp of _collectors){
        const d=dst(pp.x,pp.y,c.x,c.y);
        if(d<CFG.P_RADIUS+orbR||(pp.isHost&&mag&&d<magR)){
          c.done=true;points+=orbPts;addFloatText('+'+orbPts,c.x,c.y,CFG.COL.coll);FX_COLLECT(c.x,c.y);sndOrb();
          break;
        }
      }
    }
    if(colls.length>0&&colls.every(c=>c.done)){
      // Streak: collected all with >50% time left
      if(grp.timer>=grp.maxT*0.50){orbStreak=Math.min(orbStreak+1,5);if(orbStreak>0)addCallout('STREAK '+orbStreak,false,'#44aaff');}
      else if(orbStreak>0){orbStreak=0;addCallout('STREAK LOST',false,'#664444');}
      grp=null;colls=[];advancePhase();
    }
    else{grp.timer-=dt;if(grp.timer<=0){orbStreak=0;killPlayer();return;}}
  }

  // Pickup life + collection — only host's living player collects pickups
  if(pickup){
    pickup.life-=dt;
    if(pickup.life<=0){pickup=null;}
    else if(!(_playerDead[0]&&_mpMode==='host')&&dst(player.x,player.y,pickup.x,pickup.y)<CFG.P_RADIUS+CFG.PU_RADIUS){
      activatePickup(pickup.type);pickup=null;
    }
  }

  // Effect tick
  if(effect){
    effect.t-=dt;
    if(effect.type==='magnet'){const r=CFG.P_RADIUS*CFG.MAGNET_RFACTOR;for(const e of enemies)if(dst(player.x,player.y,e.x,e.y)<r)e.slowT=Math.max(e.slowT||0,1.0);}
    if(effect.type==='bomb'&&effect.t<=0){const r=CFG.P_RADIUS*CFG.BOMB_RFACTOR;FX_BOMB(player.x,player.y);snd('explosion');triggerShake(22,0.35);for(let i=enemies.length-1;i>=0;i--)if(dst(player.x,player.y,enemies[i].x,enemies[i].y)<r){points+=CFG.SCORE_PER_KILL;addFloatText('+'+CFG.SCORE_PER_KILL,enemies[i].x,enemies[i].y,'#ff6600');FX_ENEMY_DEATH(enemies[i].x,enemies[i].y);snd('enemy_death');enemies.splice(i,1);}effect=null;}
    else if(effect.t<=0){if(effect.type==='dimshift')for(const e of enemies)e.dimDir=null;effect=null;}
  }

  // Matrix
  if(matrixState)updateMatrixPhase(dt);
  if(slashPhase)updateSlashPhase(_rawDt,_rawDt);
  if(shooterPhase)updateShooterPhase(dt);
  if(manPhase)updateManPhase(dt);
  if(darkPhase)updateDarknessPhase(dt);
  if(recursionPhase)updateRecursionPhase(dt);
  if(miniBossActive)updateMiniBoss(dt);

  // Wrap flash
  for(let i=wrapFlash.length-1;i>=0;i--){wrapFlash[i].t+=dt;if(wrapFlash[i].t>=wrapFlash[i].dur)wrapFlash.splice(i,1);}

  // Portal transition
  if(portalTransition){
    portalTransition.t+=dt;const prog=portalTransition.t/portalTransition.dur;
    const tx=AX+AS/2,ty=AY+AS/2,ease=Math.min(1,prog*prog*2);
    player.x+=(tx-player.x)*ease*dt*6;player.y+=(ty-player.y)*ease*dt*6;player.vx*=0.7;player.vy*=0.7;
    if(portalTransition.t<1.0)triggerShake(80*(1-prog),0.08);
    if(portalTransition.t>=portalTransition.dur){player.x=AX+AS/2;player.y=AY+AS/2;player.vx=0;player.vy=0;portalTransition=null;triggerMatrixEvent();}
    return;
  }

  // Matrix portal tick
  if(matrixPortal){
    matrixPortal.life-=dt;_portalAngle+=dt*1.8;
    if(matrixPortal.life<=0){killPlayer();return;} // didn't enter in time
    else if(!matrixState&&dst(player.x,player.y,matrixPortal.x,matrixPortal.y)<CFG.P_RADIUS+38){matrixPortal=null;startPortalTransition();playMusic('matrix');}
  }

  // Boss portal tick (non-matrix)
  if(_bossPortal){
    _bossPortal.angle+=dt*1.6;
    _bossPortal.countdown-=dt;
    if(_bossPortal.countdown<=0){_bossPortal=null;killPlayer();return;} // portal expired = death
    const pr=54;
    if(dst(player.x,player.y,_bossPortal.x,_bossPortal.y)<CFG.P_RADIUS+pr){
      const t=_bossPortal.type;_bossPortal=null;snd('portal_enter');
      if(t==='slash'){initSlashPhase();playMusic('slash');}
      else if(t==='darkness'){initDarknessPhase();playMusic('darkness');}
      else if(t==='recursion'){initRecursionPhase();playMusic('recursion');}
      else if(t==='man'){initManPhase();playMusic('man');}
    }
  }

  // Wall warp decay
  for(let i=_wallWarp.length-1;i>=0;i--){_wallWarp[i].t-=dt;if(_wallWarp[i].t<=0)_wallWarp.splice(i,1);}

  // Callouts
  for(let i=callouts.length-1;i>=0;i--){callouts[i].t-=dt;if(callouts[i].t<=0)callouts.splice(i,1);}
}

/* ══════════════════════════════════════════════════════════════
   §11  RENDER

function render(ts){
  X.save();
  X.setTransform(_scale,0,0,_scale,_offX+shk.x*_scale,_offY+shk.y*_scale);
  X.fillStyle=CFG.COL.bg;
  X.fillRect(-_offX/_scale,-_offY/_scale,(_vpW*(window.devicePixelRatio||1))/_scale,(_vpH*(window.devicePixelRatio||1))/_scale);

  if(MODE==='landing'){drawLanding(ts);X.restore();return;}
  if(MODE==='lobby'){drawLobby(ts);X.restore();return;}

  // Arena
  X.fillStyle=matrixState==='digits'?POISON.MATRIX_BG:CFG.COL.arena_bg;X.fillRect(AX,AY,AS,AS);
  X.save();X.strokeStyle=CFG.COL.grid;X.lineWidth=1;
  const gs=AS/16;
  for(let gx=AX+gs;gx<AX+AS;gx+=gs){X.beginPath();X.moveTo(gx,AY);X.lineTo(gx,AY+AS);X.stroke();}
  for(let gy=AY+gs;gy<AY+AS;gy+=gs){X.beginPath();X.moveTo(AX,gy);X.lineTo(AX+AS,gy);X.stroke();}
  X.restore();

  // Walls
  if(MODE==='play'&&player){
    const m=CFG.WALL_NEAR_DIST;
    const wl=1-clmp((player.x-CFG.P_RADIUS-AX)/m,0,1),wr=1-clmp((AX+AS-player.x-CFG.P_RADIUS)/m,0,1);
    const wt=1-clmp((player.y-CFG.P_RADIUS-AY)/m,0,1),wb=1-clmp((AY+AS-player.y-CFG.P_RADIUS)/m,0,1);
    drawWallSeg(AX,AY,AX,AY+AS,wl);drawWallSeg(AX+AS,AY,AX+AS,AY+AS,wr);
    drawWallSeg(AX,AY,AX+AS,AY,wt);drawWallSeg(AX,AY+AS,AX+AS,AY+AS,wb);
  }else{
    X.save();X.strokeStyle=CFG.COL.border;X.shadowColor=CFG.COL.border;X.shadowBlur=14;X.lineWidth=2;X.strokeRect(AX,AY,AS,AS);X.restore();
  }

  // Wrap flash (wall edge glow only)
  for(const wf of wrapFlash){
    const prog=wf.t/wf.dur,a=Math.pow(1-prog,2)*0.6;
    X.save();X.strokeStyle='rgba(200,160,255,0.9)';X.shadowColor='#cc88ff';X.shadowBlur=28*(1-prog);X.lineWidth=3+6*(1-prog);X.globalAlpha=a;X.beginPath();
    if(wf.side==='L'){X.moveTo(AX,AY);X.lineTo(AX,AY+AS);}if(wf.side==='R'){X.moveTo(AX+AS,AY);X.lineTo(AX+AS,AY+AS);}
    if(wf.side==='T'){X.moveTo(AX,AY);X.lineTo(AX+AS,AY);}if(wf.side==='B'){X.moveTo(AX,AY+AS);X.lineTo(AX+AS,AY+AS);}
    X.stroke();X.restore();
  }
  // Wall warp — distortion ring around player after teleporting through a wall
  if(player){for(const ww of _wallWarp){
    const prog=1-(ww.t/ww.dur);const a=Math.pow(1-prog,2.5)*0.9;
    const baseR=CFG.P_RADIUS*1.2,expandR=CFG.P_RADIUS*5.5*prog;
    const r=baseR+expandR;
    X.save();
    // Ripple ring
    X.globalAlpha=a*0.9;X.strokeStyle='rgba(220,180,255,0.95)';X.shadowColor='#cc66ff';X.shadowBlur=18*(1-prog);
    X.lineWidth=Math.max(1,3.5*(1-prog));
    X.beginPath();X.arc(player.x,player.y,r,0,PI2);X.stroke();
    // Second smaller inner ring
    if(prog<0.55){X.globalAlpha=a*0.55;X.strokeStyle='rgba(255,255,255,0.7)';X.shadowBlur=8;X.lineWidth=1.5;
    X.beginPath();X.arc(player.x,player.y,r*0.55,0,PI2);X.stroke();}
    X.restore();
  }}

  // Orbs — render during mini boss phases too
  if(grp&&!(slashPhase&&!slashPhase.mini)){
    const frac=clmp(grp.timer/grp.maxT,0,1),low=frac<0.50,pulse=low?(0.72+0.28*Math.sin(ts/85)):1;
    const col=low?CFG.COL.coll_low:CFG.COL.coll,gc=low?'#ff1100':CFG.COL.coll_glow;

      X.strokeStyle=col;X.lineWidth=2;X.shadowColor=gc;X.shadowBlur=6;X.beginPath();X.arc(c.x,c.y,orbR+7,-Math.PI/2,-Math.PI/2+frac*PI2);X.stroke();
      X.restore();

  // Pickup
