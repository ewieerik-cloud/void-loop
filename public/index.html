    X.strokeStyle=col;X.lineWidth=2;X.shadowColor=col;X.shadowBlur=8;X.beginPath();X.arc(pu.x,pu.y,CFG.PU_RADIUS+8,-Math.PI/2,-Math.PI/2+frac*PI2);X.stroke();
    X.font=`bold 10px ${FM}`;X.textAlign='center';X.textBaseline='middle';X.globalAlpha=0.6+0.4*Math.abs(Math.sin(ts/320));
    X.shadowColor=col;X.shadowBlur=10;X.fillStyle=col;X.fillText(pu.type.slice(0,4).toUpperCase(),pu.x,pu.y-CFG.PU_RADIUS-9);
    X.globalAlpha=1;X.restore();
  }

  // Player trail
  if(player){
    for(let i=1;i<player.trail.length;i++){
      const p=player.trail[i],age=(ts-p.ts)/1000,a=clmp(1-age/CFG.TRAIL_DURATION,0,1);
      if(a<=0.01)continue;
      X.save();X.globalAlpha=a*0.6;X.fillStyle=a>0.5?CFG.COL.p_trail_hi:CFG.COL.p_trail_lo;X.shadowColor=CFG.COL.p_glow;X.shadowBlur=8*a;
      X.beginPath();X.arc(p.x,p.y,Math.max(0.5,CFG.P_RADIUS*0.7*a),0,PI2);X.fill();X.restore();
    }
  }

  // Player (local) — render ghost when downed in MP; hide completely only when MODE='dead'
  const _hostDowned = _mpMode==='host' && _playerDead[0];
  const _guestDowned = _mpMode==='guest' && _playerDead[_myPlayerIdx];
  if(player&&MODE!=='dead'){
    if(_hostDowned||_guestDowned){
      // Draw ghost (dim, gray) — the overlay will render on top
      X.save();X.globalAlpha=0.28;X.shadowColor='#888';X.shadowBlur=10;
      X.fillStyle='#aaaaaa';X.beginPath();X.arc(player.x,player.y,CFG.P_RADIUS,0,PI2);X.fill();
      X.fillStyle='#555';X.shadowBlur=0;X.beginPath();X.arc(player.x,player.y,CFG.P_RADIUS*0.38,0,PI2);X.fill();
      X.restore();
    } else {
      const pDotCol=LOBBY[0]?.color||CFG.COL.player; // player-chosen color for inner dot
      const inv2=effect?.type==='invincible',dim2=effect?.type==='dimshift';
      // Outer body: white neon purple always (unless effect override)
      const outerCol=inv2?'#ffff88':dim2?'#ccaaff':'#ffffff';
      const gc=inv2?'#ffff00':dim2?'#9966ff':CFG.COL.p_glow;
      X.save();
      let fa=1;if(effect&&effect.t>0&&effect.t<2)fa=0.28+0.72*Math.abs(Math.sin(effect.t*Math.PI*7));
      X.globalAlpha=fa;X.shadowColor=gc;X.shadowBlur=36;X.fillStyle=outerCol;X.beginPath();X.arc(player.x,player.y,CFG.P_RADIUS,0,PI2);X.fill();
      // Inner dot = player chosen color
      X.shadowBlur=8;X.shadowColor=pDotCol;X.fillStyle=pDotCol;X.beginPath();X.arc(player.x,player.y,CFG.P_RADIUS*0.38,0,PI2);X.fill();
      X.globalAlpha=1;X.restore();
    }
  }

  mpDrawPlayers(ts); // draw remote players (all modes)
  mpDrawLocalDeadOverlay(ts); // gray overlay if local player is dead (MP mode)
  if(darkPhase)drawDarknessPhase(ts);

  // Enemies
  const dim3=effect?.type==='dimshift',frz3=effect?.type==='freeze',fear3=effect?.type==='fear';
  for(const e of enemies){
    const near=player?1-clmp((dst(player.x,player.y,e.x,e.y)-CFG.P_RADIUS-CFG.E_RADIUS)/CFG.E_NEAR_DIST,0,1):0;
    const col=dim3?'#ee44ff':frz3?'#aaddff':fear3?'#ff00cc':CFG.COL.enemy;
    const gc=dim3?'#cc00ff':frz3?'#88ccff':fear3?'#ff00aa':near>0.35?CFG.COL.e_near:CFG.COL.e_glow;
    const blinkAlpha=(e.spawnAge||0)<2.0?(0.3+0.7*Math.abs(Math.sin((e.spawnAge||0)*Math.PI*3.5))):1;
    X.save();X.globalAlpha=blinkAlpha;
    if(frz3){X.shadowColor='#aaeeff';X.shadowBlur=36;X.fillStyle='#cceeff';X.beginPath();X.arc(e.x,e.y,CFG.E_RADIUS,0,PI2);X.fill();X.shadowBlur=0;X.fillStyle='rgba(255,255,255,0.95)';X.beginPath();X.arc(e.x,e.y,CFG.E_RADIUS*0.32,0,PI2);X.fill();}
    else{X.shadowColor=gc;X.shadowBlur=14+near*42;X.fillStyle=col;X.beginPath();X.arc(e.x,e.y,CFG.E_RADIUS,0,PI2);X.fill();X.shadowBlur=0;X.fillStyle='rgba(255,255,255,0.7)';X.beginPath();X.arc(e.x,e.y,CFG.E_RADIUS*0.38,0,PI2);X.fill();}
    X.restore();
  }

  // Effect rings
  if(effect&&player){
    const ef=effect;
    if(ef.type==='magnet'){const r=CFG.P_RADIUS*CFG.MAGNET_RFACTOR;X.save();X.strokeStyle='rgba(0,255,255,0.28)';X.lineWidth=1.5;X.setLineDash([8,9]);X.lineDashOffset=-ts*0.06;X.shadowColor='#00ffff';X.shadowBlur=10;X.beginPath();X.arc(player.x,player.y,r,0,PI2);X.stroke();X.restore();}
    if(ef.type==='bomb'){
      const prog=1-(ef.t/ef.maxT);
      const bombR=CFG.P_RADIUS*CFG.BOMB_RFACTOR;
      X.save();
      // Soft inner glow — builds up
      const grd=X.createRadialGradient(player.x,player.y,0,player.x,player.y,bombR);
      grd.addColorStop(0,`rgba(255,140,40,${0.06+prog*0.16})`);
      grd.addColorStop(0.65,`rgba(255,80,0,${0.04+prog*0.08})`);
      grd.addColorStop(1,'rgba(255,40,0,0)');
      X.fillStyle=grd;X.beginPath();X.arc(player.x,player.y,bombR,0,PI2);X.fill();
      // ONE clean ring — exact hitbox boundary
      const ringA=0.45+prog*0.55;
      X.strokeStyle=`rgba(255,${Math.floor(100+prog*140)},0,${ringA})`;
      X.lineWidth=2+prog*2.5;X.shadowColor='#ff6600';X.shadowBlur=14+prog*22;
      X.beginPath();X.arc(player.x,player.y,bombR,0,PI2);X.stroke();
      // Countdown
      X.font=`bold ${Math.round(15+prog*10)}px ${FM}`;X.textAlign='center';X.textBaseline='middle';
      X.fillStyle=`rgba(255,210,70,${0.75+prog*0.25})`;X.shadowColor='#ff8800';X.shadowBlur=20;
      X.fillText(Math.ceil(ef.t),player.x,player.y-CFG.P_RADIUS-24);
      X.restore();
    }
    if(ef.type==='invincible'){const pulse=0.5+0.5*Math.sin(ts/70);X.save();X.strokeStyle=`rgba(255,255,0,${0.18+pulse*0.55})`;X.lineWidth=2;X.shadowColor='#ffff00';X.shadowBlur=16;X.setLineDash([5,5]);X.lineDashOffset=-ts*0.09;X.beginPath();X.arc(player.x,player.y,CFG.P_RADIUS+12,0,PI2);X.stroke();X.restore();}
  }

  drawParts();drawMatrixFX();

  // Matrix portal
  if(matrixPortal&&!matrixState){
    const p=matrixPortal,frac=p.life/p.maxLife,fade=frac<0.2?(frac/0.2):1,pulse=0.85+0.15*Math.sin(ts/160);
    const mc=POISON.MATRIX_COL,RX=46,RY=60;
    X.save();X.globalAlpha=fade;X.shadowColor=mc;X.shadowBlur=28*pulse;X.strokeStyle=mc;X.lineWidth=3;
    X.beginPath();X.ellipse(p.x,p.y,RX,RY,_portalAngle*0.2,0,PI2);X.stroke();
    X.font='bold 11px '+FM;X.textAlign='center';X.textBaseline='middle';X.fillStyle=mc;X.shadowBlur=16;
    const mcd=Math.ceil(p.life);X.fillText(mcd+'s',p.x,p.y+RY+18);
    X.restore();
  }
  // Boss portal (non-matrix)
  if(_bossPortal){
    const bp=_bossPortal,pulse=0.85+0.15*Math.sin(ts/140),col=bp.col;
    const urgency=bp.countdown<5;
    const RX=50,RY=64;
    X.save();
    // Spinning outer ring
    X.globalAlpha=urgency?0.5+0.5*Math.sin(ts/80):1;
    X.shadowColor=col;X.shadowBlur=30*pulse+(urgency?20:0);
    // Type-specific portal designs
    if(bp.type==='slash'){
      // Red jagged slasher portal
      for(let i=0;i<8;i++){const a=bp.angle+i*PI2/8,r1=RX-10+Math.sin(i*3.1)*12,r2=RX+16;X.strokeStyle=col;X.lineWidth=2;X.beginPath();X.moveTo(bp.x+Math.cos(a)*r1,bp.y+Math.sin(a)*r1*RY/RX);X.lineTo(bp.x+Math.cos(a+PI2/16)*r2,bp.y+Math.sin(a+PI2/16)*r2*RY/RX);X.stroke();}
      X.strokeStyle=col;X.lineWidth=3;X.beginPath();X.ellipse(bp.x,bp.y,RX,RY,bp.angle*0.1,0,PI2);X.stroke();
      X.fillStyle=`rgba(80,0,0,0.35)`;X.beginPath();X.ellipse(bp.x,bp.y,RX,RY,0,0,PI2);X.fill();
    } else if(bp.type==='darkness'){
      // Dark portal with yellow stars
      X.fillStyle='rgba(10,0,20,0.7)';X.beginPath();X.ellipse(bp.x,bp.y,RX,RY,0,0,PI2);X.fill();
      X.strokeStyle='#ffdd66';X.lineWidth=2;X.shadowColor='#ffaa00';X.beginPath();X.ellipse(bp.x,bp.y,RX,RY,bp.angle*0.08,0,PI2);X.stroke();
      for(let i=0;i<6;i++){const a=bp.angle+i*PI2/6;const sr=rnd(20,RX-8);X.fillStyle='rgba(255,220,80,0.7)';X.beginPath();X.arc(bp.x+Math.cos(a)*sr,bp.y+Math.sin(a)*sr*0.8,2.5,0,PI2);X.fill();}
    } else if(bp.type==='recursion'){
      // Purple shrinking rings
      for(let r=0;r<4;r++){const ri=RX*(0.35+r*0.22);const ao=(ts*0.002+r*0.5)%PI2;X.strokeStyle=col;X.lineWidth=1.5-r*0.2;X.globalAlpha=(0.7-r*0.12)*(urgency?0.5+0.5*Math.sin(ts/80):1);X.beginPath();X.ellipse(bp.x,bp.y,ri,ri*RY/RX,ao,0,PI2);X.stroke();}
      X.globalAlpha=urgency?0.5+0.5*Math.sin(ts/80):1;
      X.strokeStyle=col;X.lineWidth=3;X.beginPath();X.ellipse(bp.x,bp.y,RX,RY,bp.angle*0.12,0,PI2);X.stroke();
    } else if(bp.type==='man'){
      // Green angry portal
      X.strokeStyle='#44ff44';X.lineWidth=3;X.shadowColor='#44ff44';X.beginPath();X.ellipse(bp.x,bp.y,RX,RY,bp.angle*0.05,0,PI2);X.stroke();
      for(let i=0;i<6;i++){const a=bp.angle*1.2+i*PI2/6;X.strokeStyle='rgba(100,255,80,0.6)';X.lineWidth=1.5;X.beginPath();X.moveTo(bp.x+Math.cos(a)*RX,bp.y+Math.sin(a)*RY);X.lineTo(bp.x+Math.cos(a)*(RX+18),bp.y+Math.sin(a)*(RY+18));X.stroke();}
    }
    // Countdown
    X.globalAlpha=1;X.shadowBlur=0;X.font=`bold ${urgency?15:11}px ${FM}`;X.textAlign='center';X.textBaseline='middle';
    X.fillStyle=urgency?'#ff2200':col;X.shadowColor=urgency?'#ff0000':col;X.shadowBlur=urgency?20:10;
    X.fillText(Math.ceil(bp.countdown)+'s',bp.x,bp.y+RY+18);
    X.fillText('ENTER',bp.x,bp.y);
    X.restore();
  }
  drawMatrixPhase(ts);
  if(slashPhase)drawSlashPhase(ts);
  if(shooterPhase)drawShooterPhase(ts);
  if(manPhase)drawManPhase(ts);
  if(darkPhase)drawDarknessPhaseObjects(ts); // orbs/boss/canon UNDER darkness overlay
  if(recursionPhase)drawRecursionPhase(ts);
  if(miniBossActive)drawMiniBoss(ts);

  // Float texts
  if(popups){for(let i=popups.length-1;i>=0;i--){
    const p=popups[i];
    const a=clmp(p.t/p.maxT,0,1);if(a<0.01)continue;
    const sz=24+Math.round(a*10); // bigger, scales up when fresh
    X.save();X.globalAlpha=a;X.font=`bold ${sz}px ${FM}`;X.textAlign='center';X.textBaseline='middle';
    X.fillStyle=p.col;X.shadowColor=p.col;X.shadowBlur=28*a+8;
    // Double-draw for stronger glow
    X.fillText(p.txt,p.x,p.y);X.shadowBlur=10*a;X.fillText(p.txt,p.x,p.y);
    X.restore();
  }}

  drawHUD(ts);
  drawCallouts(ts);
  // Dead screen logic:
  // - MP downed (local player dead but game still running): show gray overlay only — mpDrawLocalDeadOverlay handles it
  // - Full game over (MODE='dead'): show the real dead screen
  const _mpDowned = _mpMode!=='solo' && _playerDead[_myPlayerIdx] && MODE==='play';
  if(MODE==='dead' && !_mpDowned) drawDead(ts);
  if(_paused)drawPause(ts);
  X.restore();
}

function drawWallSeg(x1,y1,x2,y2,prox){
  X.save();
  const g=Math.max(0,prox);
  X.strokeStyle=CFG.COL.border;X.shadowColor=CFG.COL.border;X.shadowBlur=10+g*26;X.lineWidth=2+g*2;X.globalAlpha=0.6+g*0.4;
  X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.stroke();X.restore();
}

// ── AUDIO WIDGET — two rows, bottom-right ──────────────────────
function drawAudioWidget(ts){
  const rx=W-18, rowH=22, slW=88, slH=3;
  const row1Y = H-42;  // MUSIC row  (orange)
  const row2Y = H-18;  // SFX row    (cyan)

  // icon hitboxes (left of each slider)
  const iconR=8;
  const mus_ix=rx-slW-18, mus_iy=row1Y;
  const sfx_ix=rx-slW-18, sfx_iy=row2Y;
  // slider hitboxes
  const mus_slX=rx-slW, mus_slY=row1Y;
  const sfx_slX=rx-slW, sfx_slY=row2Y;

  BTNS._audio_music  ={x:mus_ix-iconR,y:mus_iy-iconR,w:iconR*2,h:iconR*2};
  BTNS._audio_sfx    ={x:sfx_ix-iconR,y:sfx_iy-iconR,w:iconR*2,h:iconR*2};
  BTNS._audio_slider ={x:mus_slX,y:mus_slY-8,w:slW,h:16,_slX:mus_slX,_slW:slW};
  BTNS._audio_sfx_sl ={x:sfx_slX,y:sfx_slY-8,w:slW,h:16,_slX:sfx_slX,_slW:slW};

  const hovMusIco =_mx>=mus_ix-iconR&&_mx<=mus_ix+iconR&&_my>=mus_iy-iconR&&_my<=mus_iy+iconR;
  const hovSfxIco =_mx>=sfx_ix-iconR&&_mx<=sfx_ix+iconR&&_my>=sfx_iy-iconR&&_my<=sfx_iy+iconR;
  const hovMusSl  =_mx>=mus_slX-4&&_mx<=mus_slX+slW+4&&_my>=mus_slY-8&&_my<=mus_slY+8;
  const hovSfxSl  =_mx>=sfx_slX-4&&_mx<=sfx_slX+slW+4&&_my>=sfx_slY-8&&_my<=sfx_slY+8;
  const anyHov    =hovMusIco||hovSfxIco||hovMusSl||hovSfxSl;

  X.save();

  // ── corner bracket frame (tall enough for two rows) ──
  const fx=mus_ix-iconR-10, fy=H-56, fw=rx-fx+6, fh=50;
  const cl=6;
  const frameCol=anyHov?'rgba(255,255,255,0.18)':'rgba(255,255,255,0.07)';
  X.strokeStyle=frameCol; X.lineWidth=1;
  X.beginPath();X.moveTo(fx+cl,fy);     X.lineTo(fx,fy);     X.lineTo(fx,fy+cl);    X.stroke();
  X.beginPath();X.moveTo(rx-cl+6,fy);   X.lineTo(rx+6,fy);   X.lineTo(rx+6,fy+cl);  X.stroke();
  X.beginPath();X.moveTo(fx+cl,fy+fh);  X.lineTo(fx,fy+fh);  X.lineTo(fx,fy+fh-cl); X.stroke();
  X.beginPath();X.moveTo(rx-cl+6,fy+fh);X.lineTo(rx+6,fy+fh);X.lineTo(rx+6,fy+fh-cl);X.stroke();
  // center divider between rows
  X.strokeStyle='rgba(255,255,255,0.05)'; X.lineWidth=1;
  X.setLineDash([2,4]);
  X.beginPath();X.moveTo(fx+4,fy+fh/2);X.lineTo(rx+2,fy+fh/2);X.stroke();
  X.setLineDash([]);

  // ── helper: draw one slider row ──
  function _drawRow(ix, iy, slX, slY, on, hovIco, hovSl, vol, accentA, accentB, type){
    // Icon
    X.save();
    X.translate(ix, iy);
    const ic = on ? (hovIco?accentA:accentB) : (hovIco?'rgba(255,80,80,0.9)':'rgba(130,80,70,0.45)');
    X.strokeStyle=ic; X.fillStyle=ic;
    X.shadowColor=on?(hovIco?accentA:'rgba(0,0,0,0)'):'rgba(255,40,40,0.4)';
    X.shadowBlur=hovIco?10:(on?0:4);
    X.lineWidth=1.3; X.lineCap='round';

    if(type==='music'){
      X.beginPath();X.moveTo(3,-6);X.lineTo(3,2);X.stroke();
      X.beginPath();X.arc(-1,3,3.5,0,Math.PI*2);X.fill();
      if(!on){ X.strokeStyle='rgba(255,60,60,0.85)';X.lineWidth=1.4;X.beginPath();X.moveTo(-5,-5);X.lineTo(5,5);X.stroke(); }
    } else {
      X.beginPath();X.moveTo(-4,-3);X.lineTo(-4,3);X.lineTo(-1,3);X.lineTo(4,6);X.lineTo(4,-6);X.lineTo(-1,-3);X.closePath();X.fill();
      if(on){ X.lineWidth=1.2;X.beginPath();X.arc(4,0,3.5,-0.5,0.5);X.stroke();X.beginPath();X.arc(4,0,6,-0.65,0.65);X.stroke();}
      else  { X.strokeStyle='rgba(255,60,60,0.85)';X.lineWidth=1.4;X.beginPath();X.moveTo(3,-4);X.lineTo(9,4);X.stroke();X.beginPath();X.moveTo(9,-4);X.lineTo(3,4);X.stroke();}
    }
    // label
    X.shadowBlur=0;
    X.font=`6px ${FM}`;X.textAlign='center';X.textBaseline='top';
    X.fillStyle=on?(hovIco?accentA:'rgba(255,255,255,0.25)'):'rgba(180,60,60,0.4)';
    X.fillText(type==='music'?'MUS':'SFX',0,8);
    X.restore();

    // Ticks
    const ticks=8;
    const fillW=slW*(on?vol:0);
    const thumbX=slX+fillW;
    for(let i=0;i<=ticks;i++){
      const tx=slX+i*(slW/ticks), filled=tx<=thumbX+1;
      X.strokeStyle=filled?(on?accentB:'rgba(120,60,60,0.2)'):'rgba(255,255,255,0.06)';
      X.lineWidth=1;
      X.beginPath();X.moveTo(tx,slY-3);X.lineTo(tx,slY+3);X.stroke();
    }
    // Base track
    X.lineCap='round';
    X.strokeStyle='rgba(255,255,255,0.06)'; X.lineWidth=slH;
    X.beginPath();X.moveTo(slX,slY);X.lineTo(slX+slW,slY);X.stroke();
    // Fill
    if(fillW>1){
      X.strokeStyle=on?accentB:'rgba(100,50,50,0.3)';
      X.lineWidth=slH;
      X.shadowColor=on?accentA:'transparent';
      X.shadowBlur=hovSl?7:3;
      X.beginPath();X.moveTo(slX,slY);X.lineTo(slX+fillW,slY);X.stroke();
      X.shadowBlur=0;
    }
    // Diamond thumb
    const tr=hovSl?5:3.8;
    X.save();
    X.translate(thumbX,slY); X.rotate(Math.PI/4);
    X.fillStyle=hovSl?'#ffffff':(on?accentA:'rgba(180,100,80,0.5)');
    X.shadowColor=hovSl?accentA:'transparent'; X.shadowBlur=hovSl?12:0;
    X.fillRect(-tr/2,-tr/2,tr,tr);
    X.restore();
    // % label
    X.font=`7px ${FM}`;X.textAlign='right';X.textBaseline='middle';
    X.fillStyle=on?'rgba(255,255,255,0.3)':'rgba(160,80,70,0.35)';
    X.shadowBlur=0;
    X.fillText(on?Math.round(vol*100)+'%':'--', rx, slY);
  }

  // Music row — orange/red
  _drawRow(mus_ix,mus_iy, mus_slX,mus_slY, _musicOn, hovMusIco, hovMusSl,
           _musicVolume, 'rgba(255,140,40,1)', 'rgba(255,80,10,0.85)', 'music');
  // SFX row — cyan/teal
  _drawRow(sfx_ix,sfx_iy, sfx_slX,sfx_slY, _sfxOn,   hovSfxIco,  hovSfxSl,
           _sfxVolume,   'rgba(0,220,200,1)', 'rgba(0,180,160,0.85)', 'sfx');

  X.restore();
}
function _roundRect(x,y,w,h,r){
  X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);
  X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);X.closePath();
}

function drawPause(ts){
  const cx=W/2,cy=H/2;
  X.fillStyle='rgba(0,0,0,0.72)';X.fillRect(-_offX/_scale,-_offY/_scale,(_vpW*(window.devicePixelRatio||1))/_scale,(_vpH*(window.devicePixelRatio||1))/_scale);
  X.save();X.textAlign='center';
  X.font=`60px ${FT}`;X.fillStyle='#ff2200';X.shadowColor='#ff0000';X.shadowBlur=60;X.textBaseline='middle';
  X.fillText('PAUSED',cx,cy-80);
  X.shadowBlur=0;
  // Continue
  const bw=220,bh=52,gap=16;
  BTNS.pause_continue={x:cx-bw/2,y:cy,w:bw,h:bh};
  BTNS.pause_quit={x:cx-bw/2,y:cy+bh+gap,w:bw,h:bh};
  const hc=inBtn(BTNS.pause_continue),hq=inBtn(BTNS.pause_quit);
  X.strokeStyle=hc?'#ff5500':'#cc1100';X.lineWidth=2;X.shadowColor='#ff2200';X.shadowBlur=hc?30:12;X.strokeRect(cx-bw/2,cy,bw,bh);
  if(hc){X.fillStyle='rgba(180,0,0,0.15)';X.fillRect(cx-bw/2,cy,bw,bh);}
  X.font=`bold 13px ${FM}`;X.textBaseline='middle';X.fillStyle=hc?'#ff6633':'#ff2200';X.shadowBlur=0;X.fillText('CONTINUE',cx,cy+bh/2);
  X.strokeStyle=hq?'#888':'#444';X.lineWidth=2;X.shadowBlur=0;X.strokeRect(cx-bw/2,cy+bh+gap,bw,bh);
  if(hq){X.fillStyle='rgba(80,80,80,0.1)';X.fillRect(cx-bw/2,cy+bh+gap,bw,bh);}
  X.fillStyle=hq?'#ccc':'#666';X.fillText('QUIT TO MENU',cx,cy+bh+gap+bh/2);
  X.font=`10px ${FM}`;X.fillStyle='rgba(100,100,120,0.7)';X.fillText('ESC to resume',cx,cy-28);
  X.restore();
  drawAudioWidget(ts);
}

function formatTime(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=Math.floor(s%60),ms=Math.floor((s%1)*100);
  return (h>0?String(h).padStart(2,'0')+':':'')+String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0')+':'+String(ms).padStart(2,'0');
}

function drawHUD(ts){
  X.save();
  // Left: PHASE
  X.font=`bold 18px ${FM}`;
  X.textAlign='left';X.textBaseline='bottom';X.fillStyle=CFG.COL.hud_phase;X.shadowColor=CFG.COL.hud_phase;X.shadowBlur=10;
  X.fillText('PHASE '+phase,AX,AY-8);

  // Centre: survival timer in YELLOW (main indicator)
  const timeTxt=formatTime(survivalTime);
  X.font=`bold 22px ${FM}`;
  X.textAlign='center';X.fillStyle='#ffee00';X.shadowColor='#ffcc00';X.shadowBlur=16;
  X.fillText(timeTxt,AX+AS/2,AY-8);

  // Right: points
  X.font=`bold 16px ${FM}`;
  X.textAlign='right';X.fillStyle='#aaffcc';X.shadowColor='#00ffaa';X.shadowBlur=10;
  X.fillText('PTS '+points,AX+AS,AY-8);

  // Best (solo)
  if(numPlayers()===1){X.textAlign='right';X.font=`9px ${FM}`;X.fillStyle='#664400';X.shadowBlur=0;X.fillText('BEST '+formatTime(BEST),W-12,20);}
  // Orb timer bar
  if(grp&&!(slashPhase&&!slashPhase.mini)){
    const frac=clmp(grp.timer/grp.maxT,0,1),low=frac<0.50;
    X.shadowBlur=0;X.fillStyle='#09020d';X.fillRect(AX,AY+AS+12,AS,4);
    X.fillStyle=low?'#ff2200':'#1144cc';X.shadowColor=low?'#ff0000':'#1144cc';X.shadowBlur=8;X.fillRect(AX,AY+AS+12,AS*frac,4);
  }

function drawCallouts(ts){
  const vis=[];
  for(const c of callouts){if(c.t/c.maxT<=0)continue;const sz=c.matrix?Math.round(32*0.85):c.drama?28:18;vis.push({c,sz,lineH:sz*1.38});}
  if(!vis.length)return;
  const totalH=vis.reduce((s,v)=>s+v.lineH,0);let curY=H/2-totalH/2;
  for(const{c,sz,lineH}of vis){
    const life=clmp(c.t/c.maxT,0,1),age=1-life;
    const aIn=age<0.1?age/0.1:1,aOut=life<0.18?life/0.18:1;
    const alpha=aIn*aOut;if(alpha<0.01){curY+=lineH;continue;}
    const targetY=curY+lineH/2;curY+=lineH;
    X.save();
    if(c.matrix){
      const POOL='!@#$%&?<>[]01';const revealFrac=clmp(age/0.55,0,1);const fullLen=c.txt.length;const revealed=Math.floor(revealFrac*fullLen);
      let display='';for(let i=0;i<fullLen;i++){if(c.txt[i]===' '){display+=' ';continue;}if(i<revealed)display+=c.txt[i];else if(i===revealed)display+=POOL[Math.floor((ts/60+i)%POOL.length)];else display+=POOL[Math.floor((ts/80+i*3)%POOL.length)];}
      X.globalAlpha=alpha;X.font=`bold ${sz}px monospace`;X.textAlign='center';X.textBaseline='middle';X.shadowColor=c.col;X.shadowBlur=22;X.fillStyle=c.col;X.fillText(display,W/2,targetY);
    }else{
      const ease=1-(1-clmp(age/0.22,0,1))**3;const slideX=(c.side||0)*(1-ease)*340;
      const sc=c.drama?(life>0.68?1+(life-0.68)/0.32:1.0):(1+age*0.04);
      X.globalAlpha=alpha;X.translate(W/2+slideX,targetY);X.scale(sc,sc);X.font=`${sz}px ${FT}`;X.textAlign='center';X.textBaseline='middle';
      X.shadowColor=c.drama?'#ff8800':c.col;X.shadowBlur=c.drama?75:38;X.fillStyle=c.drama?'#ffcc00':c.col;X.fillText(c.txt,0,0);
    }
    X.restore();
  }
}

window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  KEYS[e.key]=true;if(e.key===' ')e.preventDefault();
  // Escape = pause toggle during play
  if(e.key==='Escape'&&MODE==='play'){_paused=!_paused;snd(_paused?'pause':'resume');if(_paused)pauseMusic();else resumeMusic();return;}
  if(e.key==='Escape'&&_paused){_paused=false;snd('resume');resumeMusic();return;}
  if(UI.focus==='name'){
    if(e.key==='Backspace')UI.name=UI.name.slice(0,-1);
    else if(e.key==='Enter'){UI.focus=null;}
    else if(e.key.length===1&&UI.name.length<18)UI.name+=e.key;
    return;
  }
  // MP join code input field
  if(_mpJoinFocus&&MODE==='lobby'){
    if(e.key==='Backspace')_mpJoinInput=_mpJoinInput.slice(0,-1);
    else if(e.key==='Enter'&&_mpJoinInput.length>=4&&_socket){
      _mpJoining=true;_mpJoinError='';
      const code=_mpJoinInput.toUpperCase();
      const name=(LOBBY[0]?.name||'PILOT'),color=(LOBBY[0]?.color||PLAYER_COLORS[1]);
      _mpMode='guest';_mpRoomCode=code;_myPlayerIdx=1; // optimistic — room_joined corrects
      _socket.emit('join_room',{roomCode:code,name,color});
    }
    else if(e.key.length===1&&_mpJoinInput.length<8)_mpJoinInput+=e.key.toUpperCase();
    return;
  }
  if(MODE==='dead'&&deadTimer<=0&&(e.key==='ArrowUp'||e.key==='w'||e.key==='W')){_lastTs=performance.now();init();}
});
window.addEventListener('keyup',e=>{KEYS[e.key]=false;});

// Paste support for the MP join code field (Ctrl+V / Cmd+V)
window.addEventListener('paste', e => {
  if (_mpJoinFocus && MODE === 'lobby') {
    const text = (e.clipboardData || window.clipboardData).getData('text');
    if (text) {
      // Extract just alphanumeric chars, uppercase, max 8
      _mpJoinInput = text.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,8);
    }
    e.preventDefault();
  }
});

let _mx=0,_my=0,_audioSliderDragging=false,_sfxSliderDragging=false;

C.addEventListener('mousemove',e=>{
  const r=C.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  const cssS=_scale/dpr;
  mouse.x=(e.clientX-r.left-_offX/dpr)/cssS;
  mouse.y=(e.clientY-r.top-_offY/dpr)/cssS;
  _mx=mouse.x; _my=mouse.y;
  // Slider drag
  if(_audioSliderDragging && BTNS._audio_slider){
    const s=BTNS._audio_slider;
    const t=Math.max(0,Math.min(1,(mouse.x-s._slX)/s._slW));
    setMusicVolume(t);
  }
  if(_sfxSliderDragging && BTNS._audio_sfx_sl){
    const s=BTNS._audio_sfx_sl;
    const t=Math.max(0,Math.min(1,(mouse.x-s._slX)/s._slW));
    setSfxVolume(t);
  }
  let hov='';for(const k in BTNS){if(BTNS[k]&&inBtn(BTNS[k])){hov=k;break;}}
  C.style.cursor=hov?'pointer':'default';
  if(hov&&hov!==_lastHovKey)snd('ui_hover');
  _lastHovKey=hov;
});

C.addEventListener('mousedown',e=>{
  const r=C.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  const cssS=_scale/dpr;
  const mx=(e.clientX-r.left-_offX/dpr)/cssS;
  const my=(e.clientY-r.top-_offY/dpr)/cssS;
  _mx=mx; _my=my;
  if(BTNS._audio_slider){
    const s=BTNS._audio_slider;
    if(mx>=s.x&&mx<=s.x+s.w&&my>=s.y&&my<=s.y+s.h){
      _audioSliderDragging=true;
      const t=Math.max(0,Math.min(1,(mx-s._slX)/s._slW));
      setMusicVolume(t);
    }
  }
  if(BTNS._audio_sfx_sl){
    const s=BTNS._audio_sfx_sl;
    if(mx>=s.x&&mx<=s.x+s.w&&my>=s.y&&my<=s.y+s.h){
      _sfxSliderDragging=true;
      const t=Math.max(0,Math.min(1,(mx-s._slX)/s._slW));
      setSfxVolume(t);
    }
  }
});

window.addEventListener('mouseup',()=>{ _audioSliderDragging=false; _sfxSliderDragging=false; });

C.addEventListener('click',e=>{
  const r=C.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  const cssS=_scale/dpr;
  mouse.x=(e.clientX-r.left-_offX/dpr)/cssS;
  mouse.y=(e.clientY-r.top-_offY/dpr)/cssS;
  _mx=mouse.x; _my=mouse.y;

  // Audio widget toggles (visible on all non-play screens)
  if(BTNS._audio_music&&inBtn(BTNS._audio_music)){ toggleMusic(); snd('ui_click'); return; }
  if(BTNS._audio_sfx  &&inBtn(BTNS._audio_sfx))  { toggleSfx();   snd('ui_click'); return; }

  snd('ui_click');

  if(MODE==='landing'){
    if(inBtn(BTNS['field_name'])){UI.focus='name';return;}
    for(let i=0;i<PLAYER_COLORS.length;i++){if(inBtn(BTNS['col_'+i])){UI.color=PLAYER_COLORS[i];return;}}
    UI.focus=null;
    if(inBtn(BTNS.land_play)){
      const name=(UI.name.trim()||'PILOT').slice(0,18).toUpperCase();
      // Already in a room (returned from landing) — go straight back to lobby
      if(_mpRoomCode){
        // Update our name/color in lobby display
        LOBBY[_myPlayerIdx]={name,color:UI.color||PLAYER_COLORS[_myPlayerIdx]||PLAYER_COLORS[0]};
        resize();MODE='lobby';playMusic('lobby');
        return;
      }
      LOBBY=[{name,color:UI.color||PLAYER_COLORS[0]}];
      _lobbyId=Math.random().toString(36).slice(2,8).toUpperCase();
      // If player arrived via invite link, auto-join that room
      if(window._pendingJoinCode && _socket){
        const code=window._pendingJoinCode.toUpperCase();
        window._pendingJoinCode=null;
        _mpJoinInput=code;
        // Set state optimistically — room_joined will correct _myPlayerIdx and lobby data
        _mpMode='guest'; _mpRoomCode=code; _myPlayerIdx=1;
        _mpJoining=true; _mpJoinError='';
        _socket.emit('join_room',{roomCode:code,name,color:UI.color||PLAYER_COLORS[1]||PLAYER_COLORS[0]});
      }
      resize();MODE='lobby';playMusic('lobby');
    }
    return;
  }
  if(MODE==='lobby'){
    if(inBtn(BTNS.copy_link)){
      try{navigator.clipboard.writeText(getLobbyInviteLink());}catch(err){}
      _inviteCopied=true;_inviteCopiedTimer=2.5;
    }
    // Create Online Room button
    if(inBtn(BTNS.create_room)&&_socket){
      const name=(LOBBY[0]?.name||'PILOT');
      const color=(LOBBY[0]?.color||PLAYER_COLORS[0]);
      _socket.emit('create_room',{name,color});
    }
    // Join field focus
    if(inBtn(BTNS['field_mp_join'])){_mpJoinFocus=true;return;}
    else _mpJoinFocus=false;
    // Join button
    if(inBtn(BTNS.mp_join_btn)&&_socket&&_mpJoinInput.length>=4){
      _mpJoining=true; _mpJoinError='';
      const name=(LOBBY[0]?.name||'PILOT');
      const color=(LOBBY[0]?.color&&LOBBY[0].color!==PLAYER_COLORS[0]) ? LOBBY[0].color : PLAYER_COLORS[1];
      const code=_mpJoinInput.toUpperCase();
      // Set optimistically so game_start can't race against room_joined
      _mpMode='guest'; _mpRoomCode=code; _myPlayerIdx=1;
      _socket.emit('join_room',{roomCode:code,name,color});
    }
    // LAUNCH — host calls init() immediately (no echo race), guests receive game_start
    if(inBtn(BTNS.launch)){
      if(_mpMode==='host'&&_socket){
        _mpLastEvent = 'LAUNCH_clicked';
        _lastTs=performance.now();
        init();                       // host starts right now
        _socket.emit('game_start');   // guests will receive this and call init()
      } else if(_mpMode!=='guest'){
        _lastTs=performance.now(); init();
      }
    }
    if(inBtn(BTNS.lobby_back)){
      if(_mpMode==='guest'){
        // Guest can't leave independently — only the host can end/leave the session
      } else if(_mpRoomCode){
        MODE='landing'; playMusic('lobby');
      } else {
        _mpMode='solo';_mpRoomCode=null;_myPlayerIdx=0;_remotePlayers=[];_guestInputs={};
        _playerDead={};_reviveTimer={};
        MODE='landing'; playMusic('lobby');
      }
    }
    return;
  }
  if(MODE==='dead'&&deadTimer<=0){
    if(inBtn(BTNS.retry)){
      _lastTs=performance.now();
      if(_mpMode==='host'&&_socket&&_mpRoomCode){
        init();
        _socket.emit('party_retry');
      } else if(_mpMode==='guest'){
        // guest waits — host controls restart
      } else {
        init();
      }
    }
    if(inBtn(BTNS.menu)){
      if(_mpMode==='guest') return; // guest can't leave independently
      if(_mpMode==='host'&&_socket&&_mpRoomCode) _socket.emit('host_left_game');
      resize();MODE='lobby';playMusic('lobby');
    }
  }
  if(_paused){
    if(inBtn(BTNS.pause_continue)){_paused=false;snd('resume');resumeMusic();}
    if(inBtn(BTNS.pause_quit)){
      if(_mpMode==='guest') return; // guest can't leave independently
      _paused=false;
      if(_mpMode==='host'&&_socket&&_mpRoomCode) _socket.emit('host_left_game');
      stopMusic();resize();MODE='lobby';playMusic('lobby');
    }
  }
});

/* ══════════════════════════════════════════════════════════════
   §MP  MULTIPLAYER  (CLIENT SIDE)
   ─ _mpMode: 'solo' | 'host' | 'guest'
   ─ HOST: runs full game simulation, emits state snapshot ~20Hz
   ─ GUEST: receives state from host via server, skips gameUpdate,
            renders received state, sends KEYS to server each frame
   ─ Server (server.js) only relays — no game logic runs there
══════════════════════════════════════════════════════════════ */
let _socket       = null;   // Socket.IO connection
let _mpMode       = 'solo'; // 'solo' | 'host' | 'guest'
let _mpLastEvent  = 'none'; // last socket event received (debug)
let _mpRoomCode   = null;   // 6-char room code
let _myPlayerIdx  = 0;      // This client's player slot (0 = host)
let _mpJoining    = false;  // True while waiting for join confirmation
let _mpJoinInput  = '';     // Room code typed in JOIN field
let _mpJoinError  = '';     // Error message for join attempts
let _mpJoinFocus  = false;  // Whether join input field is focused
let _pendingGameStart = false; // game_start arrived before room_joined confirmed

// Host only: latest inputs received from each guest   { idx → {keys} }
let _guestInputs  = {};

// Revival system — host-authoritative
// _playerDead[idx]: is player idx dead (but not game-over)
// _reviveProgress[idx]: 0..1 progress of revival
// _reviveTimer[idx]: seconds an alive player has been in range
let _playerDead     = {};   // { idx: bool }
let _reviveTimer    = {};   // { idx: float seconds }
const REVIVE_RADIUS = 34;   // how close to stand to revive (px, slightly bigger than player)
const REVIVE_TIME   = 2.0;  // seconds to revive

// Guest only: latest game state received from host
let _remoteState  = null;

// All modes: other players rendered as colored dots   [{idx,x,y,color,name}]
let _remotePlayers = [];

/** Initialise Socket.IO and wire all multiplayer events */
function mpInit() {
  if (!window._MP_ENABLED || typeof io === 'undefined' || !io) {
    console.log('[MP] Solo mode — no server');
    return;
  }
  _socket = io();

  /* ── Lobby events ──────────────────────────────────── */

  // HOST receives this after 'create_room'
  _socket.on('room_created', ({ roomCode, playerIdx, lobby }) => {
    _mpLastEvent = 'room_created:'+roomCode;
    _mpMode      = 'host';
    _mpRoomCode  = roomCode;
    _myPlayerIdx = playerIdx;
    _lobbyId     = roomCode;
    LOBBY        = _lobbyFromSnapshot(lobby);
    _mpJoining   = false;
  });

  // GUEST receives this after 'join_room'
  _socket.on('room_joined', ({ roomCode, playerIdx, lobby }) => {
    _mpLastEvent = 'room_joined:'+roomCode+'/P'+playerIdx;
    _mpMode      = 'guest';
    _mpRoomCode  = roomCode;
    _myPlayerIdx = playerIdx;
    LOBBY        = _lobbyFromSnapshot(lobby);
    _mpJoining   = false;
    _mpJoinError = '';
    // If game_start arrived before this confirmation, launch now
    if (_pendingGameStart) { _pendingGameStart=false; _lastTs=performance.now(); init(); return; }
    resize(); MODE = 'lobby'; playMusic('lobby');
  });

  // ALL: lobby player list changed
  _socket.on('lobby_update', ({ lobby }) => {
    _mpLastEvent = 'lobby_update:'+lobby.length+'players';
    LOBBY = _lobbyFromSnapshot(lobby);
  });

  _socket.on('room_error', (msg) => {
    _mpJoinError = msg;
    _mpJoining   = false;
    // Roll back optimistic state
    _mpMode = 'solo'; _mpRoomCode = null; _myPlayerIdx = 0;
  });

  // ALL players receive game_start — host ignores it (already called init()), guests launch.
  _socket.on('game_start', () => {
    if (_mpMode === 'host') return;   // host already started
    if (MODE === 'play') return;       // already in a game
    // If still waiting for room_joined confirmation, store intent and fire on confirm
    if (_mpJoining || !_mpRoomCode) { _pendingGameStart = true; return; }
    _mpMode = 'guest';
    _lastTs = performance.now();
    init();
  });

  // HOST becomes host after original host disconnects
  _socket.on('promoted_to_host', () => {
    _mpMode = 'host';
    addCallout('YOU ARE NOW HOST', false, '#ffcc00');
  });

  // HOST went back to lobby without disconnecting — guests follow
  _socket.on('host_left_game', () => {
    if (_mpMode !== 'guest') return;
    stopMusic();
    _playerDead = {}; _reviveTimer = {}; _remotePlayers = []; _remoteState = null;
    MODE = 'lobby';
    playMusic('lobby');
    addCallout('HOST RETURNED TO LOBBY', false, '#ff8800');
  });

  // HOST clicked retry — all guests restart the game together
  _socket.on('party_retry', () => {
    if (_mpMode !== 'guest') return;
    _lastTs = performance.now();
    init();
  });

  /* ── In-game sync ──────────────────────────────────── */

  // GUEST receives full game state from host (via server relay)
  _socket.on('game_state', (state) => {
    if (_mpMode !== 'guest') return;
    _remoteState = state;
  });

  // HOST receives guest key input (relayed by server)
  _socket.on('guest_input', ({ idx, keys }) => {
    if (_mpMode !== 'host') return;
    _guestInputs[idx] = keys;
  });

  _socket.on('game_over', (data) => {
    if (_mpMode !== 'guest') return;
    // Sync final stats from host before showing dead screen
    if (data) {
      if (data.pts !== undefined) points = data.pts;
      if (data.st  !== undefined) survivalTime = data.st;
      if (data.ph  !== undefined) phase = data.ph;
    }
    if (survivalTime > BEST) BEST = survivalTime;
    stopMusic();
    deadTimer = DEAD_DELAY; deadAge = 0;
    MODE = 'dead';
  });
}

/** Convert compact lobby snapshot [{idx,name,color}] → LOBBY array */
function _lobbyFromSnapshot(snap) {
  const arr = [];
  for (const p of snap) arr[p.idx] = { name: p.name, color: p.color };
  return arr;
}

/** HOST: build compact state snapshot for broadcast */
function _mpBuildState() {
  const rpList = [];
  for (let i = 0; i < _remotePlayers.length; i++) {
    if (_remotePlayers[i]) {
      const rp = _remotePlayers[i];
      rpList.push({ idx:rp.idx, x:rp.x, y:rp.y, name:rp.name, color:rp.color,
                    dead:!!_playerDead[rp.idx], rv:_reviveTimer[rp.idx]||0 });
    }
  }
  // Per-guest enemy sets keyed by guest index string
  const ge = {};
  for (const idxStr in _guestEnemies) {
    ge[idxStr] = _guestEnemies[idxStr].map(e=>({x:e.x,y:e.y,sa:e.spawnAge||0}));
  }
  // Float texts (last 8) and callouts (last 4) so guest sees feedback
  const po = (popups||[]).slice(-8).map(p=>({txt:p.txt,x:p.x,y:p.y,col:p.col,t:p.t,mt:p.maxT,vy:p.vy||0}));
  const ca = (callouts||[]).filter(c=>c.t>0).slice(-4).map(c=>({txt:c.txt,t:c.t,col:c.col,drama:!!c.drama}));
  return {
    p:   player ? {x:player.x,y:player.y} : null,
    p0dead: !!_playerDead[0],
    p0rv: _reviveTimer[0]||0,
    rp:  rpList,
    e:   enemies.map(e=>({x:e.x,y:e.y,sa:e.spawnAge||0})),
    ge,
    c:   colls.map(c=>({x:c.x,y:c.y,d:c.done,r:c.r||CFG.C_RADIUS})),
    g:   grp    ? {t:grp.timer,m:grp.maxT,n:grp.n} : null,
    pu:  pickup ? {x:pickup.x,y:pickup.y,tp:pickup.type,l:pickup.life} : null,
    pts: points, ph: phase, st: survivalTime, sk: orbStreak,
    po, ca,
    ef:  effect ? {type:effect.type,t:effect.t,maxT:effect.maxT} : null,
  };
}

// Per-guest enemy sets — each guest gets their own enemies targeting them
let _guestEnemies = {};

function _mpSpawnGuestEnemy(guestIdx) {
  if (!_guestEnemies[guestIdx]) _guestEnemies[guestIdx] = [];
  const m = CFG.E_RADIUS + 20;
  const x = AX + m + Math.random() * (AS - m*2);
  const y = AY + m + Math.random() * AS * 0.25;
  _guestEnemies[guestIdx].push({
    x, y, vx:0, vy:0,
    spd: CFG.P_MAX_SPEED * rnd(CFG.E_SPEED_MIN, CFG.E_SPEED_MAX),
    rt: rnd(CFG.E_REACT_MIN, CFG.E_REACT_MAX), rtimer: rnd(0, 0.18),
    ddx:0, ddy:1, slowT:0, dimDir:null, spawnAge:0,
  });
}

/** HOST: update guest state from received position, run guest enemies, handle revival */
function _mpUpdateGuestPlayers(dt) {
  if (_mpMode !== 'host') return;

  for (const idxStr in _guestInputs) {
    const idx = +idxStr;
    if (idx === 0) continue;
    const input = _guestInputs[idx];

    if (!_remotePlayers[idx]) {
      const pInfo = LOBBY[idx] || {};
      _remotePlayers[idx] = {
        idx, x: AX+AS/2, y: AY+AS/2, vx:0, vy:0, trail:[],
        name:  pInfo.name  || 'P'+(idx+1),
        color: pInfo.color || PLAYER_COLORS[idx % PLAYER_COLORS.length],
        dead: false, rv: 0,
      };
    }
    const gp = _remotePlayers[idx];
    if (!gp.trail) gp.trail = [];

    // Use position sent by guest — no host-side physics so no divergence/teleporting
    if (!_playerDead[idx] && input.px !== undefined) {
      gp.x = input.px; gp.y = input.py;
    }

    // Keep dead/rv on the object for mpDrawPlayers
    gp.dead = !!_playerDead[idx];
    gp.rv   = _reviveTimer[idx] || 0;

    // Update trail
    if (!_playerDead[idx]) {
      const now = performance.now();
      gp.trail.push({x: gp.x, y: gp.y, ts: now});
      const cutoff = now - CFG.TRAIL_DURATION * 1000;
      while (gp.trail.length > CFG.TRAIL_MAX_PTS) gp.trail.shift();
      while (gp.trail.length > 0 && gp.trail[0].ts < cutoff) gp.trail.shift();
    }

    // ── Guest-specific enemies ────────────────────────────────
    if (!_guestEnemies[idx]) _guestEnemies[idx] = [];
    const ge = _guestEnemies[idx];
    const targetCount = enemies.length || 1; // mirror host enemy count
    while (ge.length < targetCount) _mpSpawnGuestEnemy(idx);

    if (!_playerDead[idx]) {
      for (let i = ge.length - 1; i >= 0; i--) {
        const e = ge[i];
        e.spawnAge = (e.spawnAge||0) + dt;
        e.rtimer -= dt;
        if (e.rtimer <= 0) {
          e.rtimer = e.rt;
          const dx = gp.x - e.x, dy = gp.y - e.y, d = Math.sqrt(dx*dx+dy*dy)||1;
          e.ddx = dx/d; e.ddy = dy/d;
        }
        e.vx += e.ddx * CFG.E_ACCEL * dt; e.vy += e.ddy * CFG.E_ACCEL * dt;
        const ef = Math.exp(-CFG.E_DAMP*dt); e.vx *= ef; e.vy *= ef;
        const es = Math.sqrt(e.vx**2+e.vy**2);
        if (es > e.spd && es > 0) { e.vx = e.vx/es*e.spd; e.vy = e.vy/es*e.spd; }
        e.x += e.vx*dt; e.y += e.vy*dt;
        e.x = Math.max(AX+CFG.E_RADIUS, Math.min(AX+AS-CFG.E_RADIUS, e.x));
        e.y = Math.max(AY+CFG.E_RADIUS, Math.min(AY+AS-CFG.E_RADIUS, e.y));
        // Collision
        if ((e.spawnAge||0) >= 1.5 && dst(gp.x, gp.y, e.x, e.y) < CFG.P_RADIUS + CFG.E_RADIUS) {
          _killGuestPlayer(idx); break;
        }
      }
    }
  }

  // ── REVIVAL LOGIC ──────────────────────────────────────────
  const allPos = [
    { idx:0, x:player?.x, y:player?.y, dead:!!_playerDead[0] },
    ...Object.keys(_guestInputs).map(i => {
      const rp = _remotePlayers[+i];
      return { idx:+i, x:rp?.x, y:rp?.y, dead:!!_playerDead[+i] };
    }),
  ];
  for (const dp of allPos) {
    if (!dp.dead || dp.x === undefined) continue;
    const rescuer = allPos.find(ap => !ap.dead && ap.idx !== dp.idx && ap.x !== undefined && dst(ap.x, ap.y, dp.x, dp.y) < REVIVE_RADIUS);
    if (rescuer) {
      _reviveTimer[dp.idx] = (_reviveTimer[dp.idx]||0) + dt;
      if (_reviveTimer[dp.idx] >= REVIVE_TIME) {
        _playerDead[dp.idx] = false; _reviveTimer[dp.idx] = 0;
        addCallout('REVIVED!', false, '#44ff88'); snd('pickup');
        if (dp.idx !== 0 && _remotePlayers[dp.idx]) { _remotePlayers[dp.idx].x = AX+AS/2; _remotePlayers[dp.idx].y = AY+AS/2; _remotePlayers[dp.idx].vx=0; _remotePlayers[dp.idx].vy=0; }
        if (dp.idx === 0) { player.x = AX+AS/2; player.y = AY+AS/2; player.vx=0; player.vy=0; }
      }
    } else { _reviveTimer[dp.idx] = 0; }
    // Keep rv updated on object for draw
    if (_remotePlayers[dp.idx]) { _remotePlayers[dp.idx].rv = _reviveTimer[dp.idx]||0; _remotePlayers[dp.idx].dead = !!_playerDead[dp.idx]; }
  }
}

/** GUEST: apply received host state so everything renders correctly */
function _mpApplyRemoteState(s) {
  if (!s) return;

  // Use THIS guest's own enemy set if available; fall back to host enemies
  const myGE = s.ge && s.ge[String(_myPlayerIdx)];
  if (myGE) {
    enemies = myGE.map(e=>({x:e.x,y:e.y,spawnAge:e.sa,vx:0,vy:0,spd:CFG.P_MAX_SPEED*0.45,rt:0.3,rtimer:0,ddx:0,ddy:-1,slowT:0,dimDir:null}));
  } else if (s.e) {
    enemies = s.e.map(e=>({x:e.x,y:e.y,spawnAge:e.sa,vx:0,vy:0,spd:0,rt:0,rtimer:0,ddx:0,ddy:-1,slowT:0,dimDir:null}));
  }

  if (s.c !== undefined) colls = (s.c||[]).map(c=>({x:c.x,y:c.y,done:c.d,r:c.r||CFG.C_RADIUS}));
  grp    = s.g  ? {timer:s.g.t,maxT:s.g.m,n:s.g.n} : null;
  pickup = s.pu ? {x:s.pu.x,y:s.pu.y,type:s.pu.tp,life:s.pu.l} : null;
  points = s.pts; phase = s.ph; survivalTime = s.st; orbStreak = s.sk;

  // Sync active effect so guest sees invincible flash, freeze colour etc.
  if (s.ef) effect = {type:s.ef.type, t:s.ef.t, maxT:s.ef.maxT};
  else if (!s.ef) effect = null;

  // Merge float texts — only add ones we don't already have at the same spot
  if (s.po) {
    for (const p of s.po) {
      if (!popups.some(ex=>ex.txt===p.txt&&Math.abs(ex.x-p.x)<4&&Math.abs(ex.y-p.y)<4)) {
        popups.push({txt:p.txt,x:p.x,y:p.y,col:p.col,t:p.t,maxT:p.mt,vy:p.vy||0});
      }
    }
  }
  // Merge callouts
  if (s.ca) {
    for (const c of s.ca) {
      if (!callouts.some(ex=>ex.txt===c.txt&&ex.t>0.1)) {
        addCallout(c.txt, c.drama, c.col);
      }
    }
  }

  _playerDead[0] = !!s.p0dead;
  _reviveTimer[0] = s.p0rv||0;

  if (s.rp) {
    for (const rp of s.rp) {
      if (!rp) continue;
      const existing = _remotePlayers[rp.idx]||{};
      _remotePlayers[rp.idx] = {...rp, trail:existing.trail||[], vx:existing.vx||0, vy:existing.vy||0};
      _playerDead[rp.idx] = !!rp.dead;
      _reviveTimer[rp.idx] = rp.rv||0;

      // For our own echoed position: ONLY snap on large teleports (revive/respawn)
      // Local physics handles normal movement — no correction = no teleporting
      if (rp.idx === _myPlayerIdx && player) {
        const dx = rp.x-player.x, dy = rp.y-player.y;
        if (Math.sqrt(dx*dx+dy*dy) > 120) { player.x=rp.x; player.y=rp.y; player.vx=0; player.vy=0; }
      }
    }
  }

  // Host player position + trail for mpDrawPlayers
  if (s.p) {
    if (!_remotePlayers[0]) _remotePlayers[0] = {};
    const ex = _remotePlayers[0];
    if (!ex.trail) ex.trail = [];
    const now = performance.now();
    ex.trail.push({x:s.p.x,y:s.p.y,ts:now});
    const cutoff = now - CFG.TRAIL_DURATION*1000;
    while (ex.trail.length > CFG.TRAIL_MAX_PTS) ex.trail.shift();
    while (ex.trail.length > 0 && ex.trail[0].ts < cutoff) ex.trail.shift();
    Object.assign(_remotePlayers[0], {
      idx:0, x:s.p.x, y:s.p.y,
      name:(s.rp?.find(r=>r?.idx===0)?.name)||LOBBY[0]?.name||'HOST',
      color:(s.rp?.find(r=>r?.idx===0)?.color)||LOBBY[0]?.color||PLAYER_COLORS[0],
      dead:!!s.p0dead, rv:s.p0rv||0, trail:ex.trail,
    });
    _playerDead[0] = !!s.p0dead;
  }

  if (!player) player = {x:AX+AS/2,y:AY+AS/2,vx:0,vy:0,trail:[]};
}

/** Called each frame by main loop — emit state (host) or inputs (guest) */
let _mpLastEmit = 0;
function mpTick(ts) {
  if (!_socket) return;
  if (_mpMode === 'host' && MODE === 'play') {
    if (ts - _mpLastEmit > 30) {
      _socket.emit('game_state', _mpBuildState());
      _mpLastEmit = ts;
    }
  }
  if (_mpMode === 'guest') {
    if (MODE === 'play') {
      // Send keys AND current position — host uses position directly, no physics divergence
      _socket.emit('player_input', {
        ArrowLeft:!!KEYS['ArrowLeft'], ArrowRight:!!KEYS['ArrowRight'],
        ArrowUp:!!KEYS['ArrowUp'],    ArrowDown:!!KEYS['ArrowDown'],
        a:!!KEYS['a'], d:!!KEYS['d'], w:!!KEYS['w'], s:!!KEYS['s'],
        px: player?.x, py: player?.y,
      });
    }
    if (_remoteState) { _mpApplyRemoteState(_remoteState); _remoteState = null; }
  }
}

/** Draw remote player dots, trails, dead ghosts, revival rings */
function mpDrawPlayers(ts) {
  const myIdx = _myPlayerIdx;
  for (let i = 0; i < _remotePlayers.length; i++) {
    const rp = _remotePlayers[i];
    if (!rp || i === myIdx) continue;
    if (rp.x === undefined) continue;
    const col   = rp.color || PLAYER_COLORS[i % PLAYER_COLORS.length];
    const isDead = !!rp.dead;
    const rvProg = Math.min(1, (rp.rv || 0) / REVIVE_TIME);

    // Trail
    if (!isDead && rp.trail && rp.trail.length > 1) {
      for (let t = 1; t < rp.trail.length; t++) {
        const tp = rp.trail[t], age = (ts - tp.ts) / 1000;
        const a = clmp(1 - age / CFG.TRAIL_DURATION, 0, 1);
        if (a <= 0.01) continue;
        X.save();
        X.globalAlpha = a * 0.6;
        X.fillStyle = a > 0.5 ? '#ffffff' : col;
        X.shadowColor = col; X.shadowBlur = 8 * a;
        X.beginPath(); X.arc(tp.x, tp.y, Math.max(0.5, CFG.P_RADIUS * 0.7 * a), 0, PI2); X.fill();
        X.restore();
      }
    }

    if (isDead) {
      // Dead ghost — dimmed, gray, with dotted revival ring
      X.save();
      X.globalAlpha = 0.35;
      X.shadowColor = '#888'; X.shadowBlur = 12;
      X.fillStyle = '#aaaaaa';
      X.beginPath(); X.arc(rp.x, rp.y, CFG.P_RADIUS, 0, PI2); X.fill();
      X.fillStyle = '#555'; X.shadowBlur = 0;
      X.beginPath(); X.arc(rp.x, rp.y, CFG.P_RADIUS * 0.38, 0, PI2); X.fill();
      X.globalAlpha = 1;

      // Dotted revival zone ring
      X.setLineDash([4, 5]);
      X.strokeStyle = 'rgba(180,180,180,0.55)';
      X.lineWidth = 1.5;
      X.shadowBlur = 0;
      X.beginPath(); X.arc(rp.x, rp.y, REVIVE_RADIUS, 0, PI2); X.stroke();
      X.setLineDash([]);

      // REVIVE progress arc
      if (rvProg > 0) {
        const sweep = rvProg * PI2;
        X.strokeStyle = '#44ff88'; X.lineWidth = 3;
        X.shadowColor = '#44ff88'; X.shadowBlur = 14;
        X.beginPath(); X.arc(rp.x, rp.y, REVIVE_RADIUS + 4, -Math.PI/2, -Math.PI/2 + sweep); X.stroke();
        // Center pulsing text
        X.shadowBlur = 0; X.font = `bold 9px ${FM}`;
        X.textAlign = 'center'; X.textBaseline = 'middle';
        X.fillStyle = '#44ff88';
        X.fillText('REVIVING ' + Math.round(rvProg * 100) + '%', rp.x, rp.y + REVIVE_RADIUS + 14);
      } else {
        // "STAND HERE" hint
        X.font = `8px ${FM}`; X.textAlign = 'center'; X.textBaseline = 'middle';
        X.fillStyle = 'rgba(180,180,180,0.6)';
        X.shadowBlur = 0;
        X.fillText('STAND TO REVIVE', rp.x, rp.y + REVIVE_RADIUS + 13);
      }
      X.restore();

      // Name tag over ghost
      X.save();
      X.globalAlpha = 0.5;
      X.font = `bold 9px ${FM}`; X.textAlign = 'center'; X.textBaseline = 'bottom';
      X.fillStyle = '#aaa'; X.shadowBlur = 0;
      X.fillText((rp.name||'P'+(i+1)).toUpperCase()+' ✝', rp.x, rp.y - CFG.P_RADIUS - 3);
      X.restore();
    } else {
      // Alive remote player
      const pulse = 0.85 + 0.15 * Math.sin(ts / 300 + i);
      X.save();
      X.shadowColor = col; X.shadowBlur = 24 * pulse; X.fillStyle = '#ffffff';
      X.beginPath(); X.arc(rp.x, rp.y, CFG.P_RADIUS, 0, PI2); X.fill();
      X.shadowBlur = 8; X.fillStyle = col;
      X.beginPath(); X.arc(rp.x, rp.y, CFG.P_RADIUS * 0.38, 0, PI2); X.fill();
      X.shadowBlur = 0; X.font = `bold 9px ${FM}`;
      X.textAlign = 'center'; X.textBaseline = 'bottom';
      X.fillStyle = col;
      X.fillText((rp.name||'P'+(i+1)).toUpperCase(), rp.x, rp.y - CFG.P_RADIUS - 3);
      X.restore();
    }
  }
}

/** Draw revival ring for the LOCAL player when they are dead (host or guest view) */
function mpDrawLocalDeadOverlay(ts) {
  if (!player) return;
  const myIdx = _myPlayerIdx;
  const isDead = !!_playerDead[myIdx];
  if (!isDead) return;

  const rvProg = Math.min(1, (_reviveTimer[myIdx]||0) / REVIVE_TIME);

  // Gray overlay over whole arena
  X.save();
  X.globalAlpha = 0.55;
  X.fillStyle = '#000000';
  X.fillRect(AX, AY, AS, AS);
  X.globalAlpha = 1;

  // Desaturate hint text
  X.font = `bold 14px ${FM}`; X.textAlign = 'center'; X.textBaseline = 'middle';
  X.fillStyle = 'rgba(200,200,200,0.7)'; X.shadowBlur = 0;
  X.fillText('WAITING FOR REVIVAL', AX+AS/2, AY+AS/2 - 60);

  // Dotted ring around our ghost position
  X.setLineDash([4, 5]);
  X.strokeStyle = 'rgba(180,180,180,0.6)';
  X.lineWidth = 1.5;
  X.beginPath(); X.arc(player.x, player.y, REVIVE_RADIUS, 0, PI2); X.stroke();
  X.setLineDash([]);

  // Revival progress arc
  if (rvProg > 0) {
    const sweep = rvProg * PI2;
    X.strokeStyle = '#44ff88'; X.lineWidth = 3;
    X.shadowColor = '#44ff88'; X.shadowBlur = 18;
    X.beginPath(); X.arc(player.x, player.y, REVIVE_RADIUS + 4, -Math.PI/2, -Math.PI/2 + sweep); X.stroke();
    X.shadowBlur = 0; X.font = `bold 11px ${FM}`;
    X.textAlign = 'center'; X.textBaseline = 'middle';
    X.fillStyle = '#44ff88';
    X.fillText('REVIVING ' + Math.round(rvProg * 100) + '%', player.x, player.y + REVIVE_RADIUS + 16);
  }
  X.restore();
}

/** Get actual invite URL using current page location + room code */
function _mpInviteUrl() {
  const base = location.origin + location.pathname;
  return `${base}?join=${_mpRoomCode || 'XXXXXX'}`;
}

/* ══════════════════════════════════════════════════════════════
   §14  MAIN LOOP
══════════════════════════════════════════════════════════════ */
let _lastTs=0;
function loop(ts){
  const dt=_lastTs>0?clmp((ts-_lastTs)/1000,0,0.05):0;
  _lastTs=ts;
  stepShake(dt);
  stepFlicker(dt);
  // HOST runs full game simulation; GUEST skips gameUpdate (state comes from host)
  // Note: if host is downed in MP, gameUpdate still runs — it just skips host movement/orbs.
  // The game must continue so surviving partners can keep playing.
  if(MODE==='play'&&!_paused){
    if(_mpMode !== 'guest') {
      gameUpdate(dt,ts);
      _mpUpdateGuestPlayers(dt); // HOST: move remote players, handle revival
    } else {
      // GUEST: run LOCAL movement physics so controls feel immediate (no lag).
      // The host's state sync reconciles any drift — gameplay is still host-authoritative.
      if(player && !_playerDead[_myPlayerIdx]) {
        let ax=0,ay=0;
        if(KEYS['ArrowLeft']||KEYS['a']||KEYS['A'])ax-=CFG.P_ACCEL;
        if(KEYS['ArrowRight']||KEYS['d']||KEYS['D'])ax+=CFG.P_ACCEL;
        if(KEYS['ArrowUp']||KEYS['w']||KEYS['W'])ay-=CFG.P_ACCEL;
        if(KEYS['ArrowDown']||KEYS['s']||KEYS['S'])ay+=CFG.P_ACCEL;
        player.vx=(player.vx||0)+ax*dt; player.vy=(player.vy||0)+ay*dt;
        const pf=Math.exp(-CFG.P_DAMP*dt); player.vx*=pf; player.vy*=pf;
        const ps=Math.sqrt(player.vx**2+player.vy**2);
        if(ps>CFG.P_MAX_SPEED){player.vx=player.vx/ps*CFG.P_MAX_SPEED;player.vy=player.vy/ps*CFG.P_MAX_SPEED;}
        player.x+=player.vx*dt; player.y+=player.vy*dt;
        // Wrap walls — must match host physics exactly
        if(CFG.WRAP_WALLS){
          if(player.x-CFG.P_RADIUS<AX){player.x=AX+AS-CFG.P_RADIUS;}
          if(player.x+CFG.P_RADIUS>AX+AS){player.x=AX+CFG.P_RADIUS;}
          if(player.y-CFG.P_RADIUS<AY){player.y=AY+AS-CFG.P_RADIUS;}
          if(player.y+CFG.P_RADIUS>AY+AS){player.y=AY+CFG.P_RADIUS;}
        }else{
          player.x=Math.max(AX+CFG.P_RADIUS,Math.min(AX+AS-CFG.P_RADIUS,player.x));
          player.y=Math.max(AY+CFG.P_RADIUS,Math.min(AY+AS-CFG.P_RADIUS,player.y));
        }
        // Trail
        if(!player.trail)player.trail=[];
        player.trail.push({x:player.x,y:player.y,ts});
        while(player.trail.length>CFG.TRAIL_MAX_PTS)player.trail.shift();
        const cutoffG=ts-CFG.TRAIL_DURATION*1000;
        while(player.trail.length>0&&player.trail[0].ts<cutoffG)player.trail.shift();
      }
    }
    stepParts(dt);
    stepMatrixFX(dt);
    if(popups){for(let i=popups.length-1;i>=0;i--){popups[i].t-=dt;popups[i].y+=popups[i].vy*dt;if(popups[i].t<=0)popups.splice(i,1);}}
  } else if(MODE==='play'&&_paused){
    stepParts(dt*0.1);stepMatrixFX(dt*0.1);
  }
  if(MODE==='dead'){
    stepParts(dt);stepMatrixFX(dt);
    if(deadTimer>0)deadTimer=Math.max(0,deadTimer-dt);
    deadAge+=dt;
  }
  if(_inviteCopied){_inviteCopiedTimer=Math.max(0,_inviteCopiedTimer-dt);if(_inviteCopiedTimer<=0)_inviteCopied=false;}
  mpTick(ts); // emit state (host) or inputs (guest)
  render(ts);
  requestAnimationFrame(loop);
}

// Init on load
resize();
mpInit(); // connect socket and wire MP events
// Auto-join if URL has ?join=CODE
if (window._URL_JOIN_CODE) {
  // Show landing first so player can enter a name, then auto-advance
  window._pendingJoinCode = window._URL_JOIN_CODE;
}
playMusic('lobby');
requestAnimationFrame(ts=>{_lastTs=ts;loop(ts);});
</script>
